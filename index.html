input,select,button,textarea{font-family:inherit;font-size:16px}

/* ── Pantalla de inicio (splash) ── */
#splash{position:fixed;inset:0;z-index:9999;background:#10284A;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;transition:opacity .6s ease}
#splash.oculto{opacity:0;pointer-events:none}
#splash .marco{background:#fff;border-radius:28px;padding:30px 38px;box-shadow:0 20px 60px rgba(0,0,0,.35);opacity:0;transform:scale(.82) translateY(8px);animation:splashLogo .9s cubic-bezier(.2,.7,.3,1) .15s forwards}

#splash .slogan{color:#F59E0B;font-family:'Inter',sans-serif;font-size:18px;font-weight:700;letter-spacing:.5px;opacity:0;animation:splashTexto .6s ease .85s forwards}
#splash .barra{width:120px;height:4px;border-radius:99px;background:rgba(255,255,255,.18);overflow:hidden;opacity:0;animation:splashTexto .4s ease 1s forwards}
#splash .barra i{display:block;height:100%;width:40%;border-radius:99px;background:#F59E0B;animation:splashCarga 1.1s ease-in-out .9s infinite}
@keyframes splashLogo{to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes splashTexto{to{opacity:1}}
@keyframes splashCarga{0%{margin-left:-40%}100%{margin-left:120%}}

// ── TRACKING A SUPABASE (con respaldo offline) ───────────────
// Pega aquí tus credenciales de Supabase cuando las tengas.

const SUPABASE_URL="https://kzztephaegiabintgtdm.supabase.co";
const SUPABASE_ANON_KEY="sb_publishable_rHl4SaafTOPo7EJx4M6vjg_5eDFBU90";  // publishable key (pública, segura para el cliente)

// Registra un evento de negocio: lo respalda en localStorage y lo intenta
// enviar a Supabase. Nunca bloquea ni rompe la app (try/catch).
async function trackEvent(evento,payload={}){
  const registro={event:evento,user_id:"demo_user",payload,created_at:new Date().toISOString()};
  // a) Respaldo local (clave: analytics_events)
  try{
    const prev=JSON.parse(localStorage.getItem("analytics_events")||"[]");
    prev.push(registro);
    localStorage.setItem("analytics_events",JSON.stringify(prev));
  }catch(e){console.log("trackEvent: error guardando local",e);}
  // b) Envío a Supabase (solo si hay credenciales)
  try{
    if(SUPABASE_URL&&SUPABASE_ANON_KEY){
      await fetch(`${SUPABASE_URL}/rest/v1/analytics_events`,{
        method:"POST",
        headers:{
          "Content-Type":"application/json",
          "apikey":SUPABASE_ANON_KEY,
          "Authorization":`Bearer ${SUPABASE_ANON_KEY}`,
          "Prefer":"return=minimal",
        },
        body:JSON.stringify(registro),
      });
      console.log("trackEvent enviado a Supabase:",evento,payload);
    }else{
      console.log("trackEvent (solo local, faltan credenciales Supabase):",evento,payload);
    }
  }catch(e){console.log("trackEvent: error enviando a Supabase",e);}
}

}

const TIPO_ICO={tarjeta:"tarjeta",seguro:"escudo",seguro_auto:"auto",vehiculo:"auto",inversion:"tendencia",servicio:"luz",renta:"hogar",otro:"pin"};
function Ico({name,size=24,color="currentColor",stroke=2}){
  return <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round" style={{display:"block",flexShrink:0}}>{PATHS[name]||PATHS.mas}</svg>;
}
function IcoTipo({tipo,size=24,color="#10284A",stroke=2}){
  return <Ico name={TIPO_ICO[tipo]||"pin"} size={size} color={color} stroke={stroke}/>;
}
// Monograma de marca: "H" ámbar sobre navy redondeado
function Monograma({size=38,radio=11}){
  return <svg width={size} height={size} viewBox="0 0 38 38" style={{display:"block"}}>
    <rect width="38" height="38" rx={radio} fill="#10284A"/>
    <text x="19" y="26.5" textAnchor="middle" fontFamily="Inter,sans-serif" fontWeight="800" fontSize="22" fill="#F59E0B">H</text>
  </svg>;
}

// ── MÓDULO: INICIO ────────────────────────────────────────────
function Inicio({recordatorios,presupuesto,metas,irA}){
  const[verResumen,setVerResumen]=useState(false);
  const urgentes=recordatorios.filter(r=>diasPara(r.fecha)<=0);
  const proximosSemana=recordatorios.filter(r=>{const d=diasPara(r.fecha);return d>0&&d<=7;});
  const hora=new Date().getHours();
  const saludo=hora<12?"Buenos días ☀️":hora<18?"Buenas tardes 🌤️":"Buenas noches 🌙";

  const MODULOS=[
    {id:"dinero",icono:"dinero",nombre:"Mi dinero",desc:"Pagos, presupuesto y metas",color:"#10284A",fondo:"#eef2ff",badge:urgentes.filter(r=>r.area==="dinero").length||null},
    {id:"hogar",icono:"hogar",nombre:"Mi hogar",desc:"Servicios y recordatorios",color:"#f59e0b",fondo:"#fffbeb",badge:urgentes.filter(r=>r.area==="hogar").length||null},
    {id:"mas",icono:"mas",nombre:"Más",desc:"Auto, herramientas y productos",color:"#1a3a6e",fondo:"#f5f3ff"},
  ];

  if(verResumen) return <div>
    <button onClick={()=>setVerResumen(false)} style={{display:"flex",alignItems:"center",gap:8,border:"none",background:"none",cursor:"pointer",fontSize:16,color:"#10284A",fontWeight:500,marginBottom:20,padding:0}}>
      ← Regresar al inicio
    </button>
    <ResumenFinanciero presupuesto={presupuesto} metas={metas} recordatorios={recordatorios} irA={irA}/>
  </div>;

  return <div style={{display:"flex",flexDirection:"column",gap:20}}>
    <div style={{paddingTop:4}}>
      <div style={{fontSize:15,color:"#8FA0B4",marginBottom:3}}>{saludo}</div>
      <div style={{fontSize:26,fontWeight:800,color:"#0a1c35"}}>{USUARIO.name.split(" ")[0]}</div>
    </div>

    {urgentes.length>0&&<div>
      <div style={{fontSize:13,fontWeight:700,color:"#dc2626",marginBottom:10,display:"flex",alignItems:"center",gap:6}}>
        <span style={{width:10,height:10,borderRadius:"50%",background:"#ef4444",display:"inline-block"}}/>
        {urgentes.length===1?"Tienes 1 pago urgente":"Tienes "+urgentes.length+" pagos urgentes"}
      </div>
      {urgentes.map(r=><div key={r.id} onClick={()=>irA(r.area==="hogar"?"hogar":"dinero")}
        style={{display:"flex",alignItems:"center",gap:14,background:"#fef2f2",border:"1.5px solid #fca5a5",borderRadius:14,padding:"14px 16px",marginBottom:10,cursor:"pointer"}}>
        <div style={{width:48,height:48,borderRadius:12,background:"#fee2e2",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><IcoTipo tipo={r.tipo} size={24} color="#dc2626"/></div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:16,fontWeight:600,color:"#0a1c35"}}>{r.titulo}</div>
          <div style={{fontSize:14,color:"#dc2626",marginTop:2,fontWeight:500}}>Vence hoy</div>
        </div>
        {r.monto>0&&<div style={{fontSize:17,fontWeight:700,color:"#dc2626",flexShrink:0}}>{pesos(r.monto)}</div>}
      </div>)}
    </div>}

    {proximosSemana.length>0&&<div>
      <div style={{fontSize:13,fontWeight:700,color:"#d97706",marginBottom:10}}>⏰ Esta semana</div>
      {proximosSemana.map(r=>{
        const dias=diasPara(r.fecha);
        return <div key={r.id} onClick={()=>irA(r.area==="hogar"?"hogar":"dinero")}
          style={{display:"flex",alignItems:"center",gap:14,background:"#fffbeb",border:"1.5px solid #fde68a",borderRadius:14,padding:"12px 16px",marginBottom:8,cursor:"pointer"}}>
          <div style={{flexShrink:0}}><IcoTipo tipo={r.tipo} size={24} color="#d97706"/></div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:15,fontWeight:600,color:"#0a1c35",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.titulo}</div>
            <div style={{fontSize:13,color:"#8FA0B4",marginTop:2}}>{fechaCorta(r.fecha)}</div>
          </div>
          <div style={{textAlign:"right",flexShrink:0}}>
            {r.monto>0&&<div style={{fontSize:15,fontWeight:700,color:"#0a1c35"}}>{pesos(r.monto)}</div>}
            <div style={{fontSize:13,color:"#d97706",fontWeight:600,marginTop:2}}>en {dias}d</div>
          </div>
        </div>;
      })}
    </div>}

    {urgentes.length===0&&proximosSemana.length===0&&<div style={{background:"#f0fdf4",border:"1.5px solid #86efac",borderRadius:14,padding:"16px",display:"flex",alignItems:"center",gap:14}}>
      <span style={{fontSize:28}}>✅</span>
      <div>
        <div style={{fontSize:16,fontWeight:700,color:"#16a34a"}}>¡Todo al día!</div>
        <div style={{fontSize:14,color:"#4ade80",marginTop:2}}>No tienes pagos urgentes esta semana</div>
      </div>
    </div>}

    <div>
      <div style={{fontSize:14,fontWeight:700,color:"#8FA0B4",marginBottom:14}}>¿QUÉ QUIERES HACER?</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        {MODULOS.map(m=><button key={m.id} onClick={()=>irA(m.id)}
          style={{background:"#fff",border:"1px solid #DDE4EE",borderRadius:16,padding:"18px 14px",cursor:"pointer",textAlign:"left",display:"flex",flexDirection:"column",gap:12,position:"relative",minHeight:120,boxShadow:"0 4px 16px rgba(16,40,74,.07)"}}>
          {m.badge&&<div style={{position:"absolute",top:12,right:12,background:"#ef4444",color:"#fff",borderRadius:99,fontSize:12,fontWeight:700,padding:"2px 7px",minWidth:22,textAlign:"center",boxShadow:"0 2px 8px rgba(239,68,68,.3)"}}>{m.badge}</div>}
          <div style={{width:50,height:50,borderRadius:14,background:m.fondo,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`0 4px 10px ${m.color}22`}}><Ico name={m.icono} size={26} color={m.color} stroke={2.2}/></div>
          <div>
            <div style={{fontSize:15,fontWeight:700,color:"#0a1c35",marginBottom:3}}>{m.nombre}</div>
            <div style={{fontSize:13,color:"#8FA0B4",lineHeight:1.4}}>{m.desc}</div>
          </div>
        </button>)}
      </div>
    </div>

    <button onClick={()=>setVerResumen(true)}
      style={{width:"100%",background:"#0a1c35",border:"none",borderRadius:16,padding:"18px 20px",cursor:"pointer",display:"flex",alignItems:"center",gap:16}}>
      <div style={{width:50,height:50,borderRadius:14,background:"rgba(255,255,255,.1)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Ico name="tendencia" size={24} color="#F59E0B"/></div>
      <div style={{textAlign:"left",flex:1}}>
        <div style={{fontSize:16,fontWeight:700,color:"#fff"}}>Ver mi resumen financiero</div>
        <div style={{fontSize:13,color:"rgba(255,255,255,.6)",marginTop:2}}>Presupuesto, metas y próximos pagos</div>
      </div>
      <div style={{color:"rgba(255,255,255,.4)",fontSize:22}}>›</div>
    </button>
  </div>;
}

// ── RESUMEN FINANCIERO ────────────────────────────────────────
function ResumenFinanciero({presupuesto,metas,recordatorios,irA}){
  const gastado=presupuesto.categorias.reduce((s,c)=>s+c.gastado,0);
  const limite=presupuesto.categorias.reduce((s,c)=>s+c.limite,0);
  const libre=presupuesto.ingreso-gastado;
  const proximos30=recordatorios.filter(r=>diasPara(r.fecha)<=30).sort((a,b)=>diasPara(a.fecha)-diasPara(b.fecha));
  return <div style={{display:"flex",flexDirection:"column",gap:20}}>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      {[
        {etiqueta:"Lo que ganas al mes",valor:pesos(presupuesto.ingreso),color:"#10284A"},
        {etiqueta:"Lo que has gastado",valor:pesos(gastado),color:gastado>limite?"#ef4444":"#10b981"},
        {etiqueta:"Dinero que te queda",valor:pesos(libre),color:libre<0?"#ef4444":"#f59e0b"},
        {etiqueta:"Pagos próximos 30 días",valor:pesos(proximos30.reduce((s,r)=>s+r.monto,0)),color:"#53647D"},
      ].map(t=><div key={t.etiqueta} style={{background:"#fff",border:"1.5px solid #DDE4EE",borderRadius:14,padding:"14px"}}>
        <div style={{fontSize:20,fontWeight:800,color:t.color}}>{t.valor}</div>
        <div style={{fontSize:13,color:"#8FA0B4",marginTop:4,lineHeight:1.4}}>{t.etiqueta}</div>
      </div>)}
    </div>
    <div style={{background:"#fff",border:"1.5px solid #DDE4EE",borderRadius:14,padding:"16px"}}>
      <div style={{fontSize:16,fontWeight:700,color:"#0a1c35",marginBottom:14}}>Próximos pagos</div>
      {proximos30.length===0?<div style={{textAlign:"center",padding:"20px 0",color:"#8FA0B4",fontSize:15}}>Sin pagos próximos 🎉</div>:
      proximos30.slice(0,4).map(r=>{
        const dias=diasPara(r.fecha),u=urgencia(dias);
        return <div key={r.id} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 12px",borderRadius:10,background:u.fondo,marginBottom:8}}>
          <div style={{flexShrink:0}}><IcoTipo tipo={r.tipo} size={22} color="#10284A"/></div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:15,fontWeight:600,color:"#0a1c35",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.titulo}</div>
            <div style={{fontSize:13,color:"#8FA0B4",marginTop:1}}>{fechaCorta(r.fecha)}</div>
          </div>
          <div style={{textAlign:"right",flexShrink:0}}>
            <div style={{fontSize:15,fontWeight:700,color:"#0a1c35"}}>{pesos(r.monto)}</div>
            <div style={{fontSize:13,color:u.texto,fontWeight:600}}>{u.etiqueta}</div>
          </div>
        </div>;
      })}
    </div>
    <div style={{background:"#fff",border:"1.5px solid #DDE4EE",borderRadius:14,padding:"16px"}}>
      <div style={{fontSize:16,fontWeight:700,color:"#0a1c35",marginBottom:14}}>Mis categorías de gasto</div>
      {presupuesto.categorias.map(c=><div key={c.id} style={{marginBottom:12}}>
        <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
          <span style={{fontSize:15,color:"#374151"}}>{c.icono} {c.nombre}</span>
          <span style={{fontSize:14,color:c.gastado>c.limite?"#ef4444":"#53647D",fontWeight:600}}>{pesos(c.gastado)} / {pesos(c.limite)}</span>
        </div>
        <Barra valor={c.gastado} max={c.limite} color={c.gastado>c.limite?"#ef4444":c.color} alto={8}/>
      </div>)}
    </div>
    <div style={{background:"#fff",border:"1.5px solid #DDE4EE",borderRadius:14,padding:"16px"}}>
      <div style={{fontSize:16,fontWeight:700,color:"#0a1c35",marginBottom:14}}>Mis metas de ahorro</div>
      {metas.map(g=>{
        const p=Math.round(g.ahorrado/g.meta*100);
        return <div key={g.id} style={{marginBottom:14}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
            <span style={{fontSize:15,fontWeight:600,color:"#0a1c35"}}>{g.icono} {g.nombre}</span>
            <span style={{fontSize:14,color:"#8FA0B4"}}>{p}%</span>
          </div>
          <Barra valor={g.ahorrado} max={g.meta} color={g.color} alto={10}/>
          <div style={{display:"flex",justifyContent:"space-between",marginTop:5}}>
            <span style={{fontSize:13,color:"#8FA0B4"}}>Ahorrado: {pesos(g.ahorrado)}</span>
            <span style={{fontSize:13,color:"#8FA0B4"}}>Meta: {pesos(g.meta)}</span>
          </div>
        </div>;
      })}
    </div>
  </div>;
}

// ── MÓDULO: RECORDATORIOS (dinero) ────────────────────────────
function Recordatorios({recordatorios,setRecordatorios,accion,onConsumirAccion}){
  const[modalNuevo,setModalNuevo]=useState(false);
  const[modalSeguro,setModalSeguro]=useState(false);
  const[modalCotizar,setModalCotizar]=useState(null);
  const[confirmarBorrar,setConfirmarBorrar]=useState(null);
  const[leadEnviado,setLeadEnviado]=useState(false);
  const[filtro,setFiltro]=useState("todos");
  const[vista,setVista]=useState("lista");
  const[toast,setToast]=useState({visible:false,msg:""});
  const[form,setForm]=useState({titulo:"",tipo:"tarjeta",fecha:"",monto:"",cada_cuando:"Cada mes",notas:""});
  const[segForm,setSegForm]=useState({marca:"",modelo:"",anio:"",placas:"",aseguradora:"",prima:"",cobertura:"Amplia",fecha:"",cp:""});
  const[cotForm,setCotForm]=useState({nombre:"",telefono:"",cp:"",email:"",mejor_hora:"Mañana (9 a 12)",notas:""});

  useEffect(()=>{
    if(accion==="nuevo_pago"){setModalNuevo(true);onConsumirAccion();}
    if(accion==="nuevo_seguro_auto"){setModalSeguro(true);onConsumirAccion();}
  },[accion]);

  const mostrarToast=msg=>{setToast({visible:true,msg});setTimeout(()=>setToast({visible:false,msg:""}),2500);};

  const dinero=recordatorios.filter(r=>r.area==="dinero");
  const seguros=dinero.filter(r=>r.tipo==="seguro_auto");
  const listaMostrar=dinero.filter(r=>{
    if(vista==="seguros")return r.tipo==="seguro_auto";
    if(filtro==="urgentes")return diasPara(r.fecha)<=7;
    if(filtro==="mes")return diasPara(r.fecha)<=30&&diasPara(r.fecha)>7;
    return true;
  }).sort((a,b)=>diasPara(a.fecha)-diasPara(b.fecha));

  const guardarRecordatorio=()=>{
    if(!form.titulo||!form.fecha)return;
    setRecordatorios(p=>[...p,{...form,id:Date.now(),area:"dinero",monto:Number(form.monto)||0}]);
    trackEvent("recordatorio_creado",{tipo:form.tipo,monto:Number(form.monto)||0,cada_cuando:form.cada_cuando});
    setForm({titulo:"",tipo:"tarjeta",fecha:"",monto:"",cada_cuando:"Cada mes",notas:""});
    setModalNuevo(false);
    mostrarToast("¡Recordatorio guardado!");
  };

  const guardarSeguro=()=>{
    if(!segForm.marca||!segForm.modelo||!segForm.fecha)return;
    const titulo=`Seguro del coche ${segForm.aseguradora} — ${segForm.marca} ${segForm.modelo} ${segForm.anio}`;
    setRecordatorios(p=>[...p,{id:Date.now(),titulo,tipo:"seguro_auto",area:"dinero",fecha:segForm.fecha,monto:Number(segForm.prima)||0,cada_cuando:"Cada año",notas:`Placas: ${segForm.placas}`,auto:{...segForm,prima:Number(segForm.prima)||0}}]);
    trackEvent("seguro_auto_registrado",{marca:segForm.marca,modelo:segForm.modelo,anio:segForm.anio,aseguradora:segForm.aseguradora,prima:Number(segForm.prima)||0,cobertura:segForm.cobertura,cp:segForm.cp,vencimiento:segForm.fecha});
    setSegForm({marca:"",modelo:"",anio:"",placas:"",aseguradora:"",prima:"",cobertura:"Amplia",fecha:"",cp:""});
    setModalSeguro(false);
    mostrarToast("¡Seguro registrado! Te avisaremos antes de que venza.");
  };

  const enviarCotizacion=()=>{
    if(!cotForm.nombre||!cotForm.telefono||!cotForm.cp)return;
    trackEvent("lead_seguro_auto",{auto:modalCotizar?.auto,vencimiento:modalCotizar?.fecha,contacto:cotForm});
    setLeadEnviado(true);
    setTimeout(()=>{setLeadEnviado(false);setModalCotizar(null);setCotForm({nombre:"",telefono:"",cp:"",email:"",mejor_hora:"Mañana (9 a 12)",notas:""});},3000);
  };

  const borrar=id=>{
    setRecordatorios(p=>p.filter(r=>r.id!==id));
    setConfirmarBorrar(null);
    mostrarToast("Recordatorio eliminado");
  };

  return <div>
    <Toast msg={toast.msg} visible={toast.visible}/>
    <ConfirmModal open={!!confirmarBorrar} onConfirm={()=>borrar(confirmarBorrar?.id)} onCancel={()=>setConfirmarBorrar(null)} texto={`¿Quieres borrar "${confirmarBorrar?.titulo}"?`}/>

    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <h2 style={{margin:0,fontSize:22,fontWeight:800,color:"#0a1c35"}}>Mis pagos</h2>
      <div style={{display:"flex",gap:8}}>
        <button onClick={()=>setModalSeguro(true)} style={{background:"#10284A",color:"#fff",border:"none",borderRadius:10,padding:"10px 14px",fontSize:14,fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:6}}>
          🚗 Seguro auto
        </button>
        <button onClick={()=>setModalNuevo(true)} style={{background:"#10284A",color:"#fff",border:"none",borderRadius:10,padding:"10px 14px",fontSize:14,fontWeight:600,cursor:"pointer"}}>
          + Agregar
        </button>
      </div>
    </div>

    {seguros.length>0&&<div style={{background:"linear-gradient(135deg,#10284A,#1a3a6e)",borderRadius:14,padding:"14px 16px",marginBottom:16,display:"flex",alignItems:"center",gap:12}}>
      <div style={{width:48,height:48,borderRadius:12,background:"rgba(255,255,255,.15)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Ico name="auto" size={26} color="#F59E0B"/></div>
      <div style={{flex:1}}>
        <div style={{fontSize:15,fontWeight:700,color:"#fff"}}>{seguros.length} seguro{seguros.length>1?"s":""} de auto registrado{seguros.length>1?"s":""}</div>
        <div style={{fontSize:13,color:"rgba(255,255,255,.7)",marginTop:2}}>
          {seguros.filter(s=>diasPara(s.fecha)<=30).length>0?"⚠️ Uno vence pronto — revisa abajo":"Todos vigentes por ahora ✓"}
        </div>
      </div>
      <button onClick={()=>setVista(vista==="seguros"?"lista":"seguros")}
        style={{background:"rgba(255,255,255,.2)",border:"none",borderRadius:8,padding:"8px 14px",color:"#fff",fontSize:13,fontWeight:600,cursor:"pointer",flexShrink:0}}>
        {vista==="seguros"?"Ver todos":"Ver seguros"}
      </button>
    </div>}

    {vista!=="seguros"&&<div style={{display:"flex",gap:8,marginBottom:16,overflowX:"auto",paddingBottom:4}}>
      {[["todos","Todos"],["urgentes","🔴 Urgentes"],["mes","🟡 Este mes"]].map(([v,l])=><button key={v} onClick={()=>setFiltro(v)}
        style={{padding:"9px 16px",borderRadius:99,border:"1.5px solid",fontSize:14,fontWeight:500,cursor:"pointer",whiteSpace:"nowrap",borderColor:filtro===v?"#10284A":"#DDE4EE",background:filtro===v?"#10284A":"#fff",color:filtro===v?"#fff":"#53647D"}}>
        {l}
      </button>)}
    </div>}

    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      {listaMostrar.length===0&&<div style={{textAlign:"center",padding:"48px 0",color:"#8FA0B4"}}>
        <div style={{fontSize:40,marginBottom:10}}>✅</div>
        <div style={{fontSize:16,fontWeight:500,color:"#53647D",marginBottom:6}}>Sin recordatorios aquí</div>
        <div style={{fontSize:14}}>Toca "+ Agregar" para crear uno</div>
      </div>}
      {listaMostrar.map(r=>{
        const dias=diasPara(r.fecha),u=urgencia(dias);
        const esSeguro=r.tipo==="seguro_auto";
        const vencePronto=dias<=30;
        return <div key={r.id} style={{background:"#fff",borderRadius:14,border:`1.5px solid ${esSeguro?"#bfdbfe":u.borde}`,padding:"16px",borderLeft:`5px solid ${esSeguro?"#1a3a6e":u.dot}`}}>
          <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
            <div style={{width:50,height:50,borderRadius:12,background:esSeguro?"#eff6ff":u.fondo,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              <IcoTipo tipo={r.tipo} size={26} color={esSeguro?"#10284A":u.texto}/>
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:16,fontWeight:700,color:"#0a1c35",marginBottom:3}}>{r.titulo}</div>
              <div style={{fontSize:14,color:"#8FA0B4",marginBottom:4}}>{fechaLarga(r.fecha)} · {r.cada_cuando}</div>
              {esSeguro&&r.auto&&<div style={{fontSize:13,color:"#53647D",marginBottom:4}}>Cobertura {r.auto.cobertura} · Prima {pesos(r.auto.prima)}</div>}
              {!esSeguro&&r.notas&&<div style={{fontSize:13,color:"#53647D",fontStyle:"italic"}}>{r.notas}</div>}
            </div>
            <div style={{textAlign:"right",flexShrink:0}}>
              {r.monto>0&&<div style={{fontSize:17,fontWeight:800,color:"#0a1c35"}}>{pesos(r.monto)}</div>}
              <div style={{marginTop:4,background:u.fondo,color:u.texto,borderRadius:99,padding:"3px 10px",fontSize:13,fontWeight:700,display:"inline-block"}}>{u.etiqueta}</div>
            </div>
          </div>
          <div style={{display:"flex",gap:10,marginTop:14,paddingTop:12,borderTop:"1px solid #f1f5f9",flexWrap:"wrap"}}>
            {esSeguro&&vencePronto&&<button onClick={()=>{setModalCotizar(r);setLeadEnviado(false);setCotForm({nombre:"",telefono:"",cp:"",email:"",mejor_hora:"Mañana (9 a 12)",notas:"Me interesa renovar mi seguro"});}}

      <Selector etiqueta="¿Cada cuánto se repite?" value={form.cada_cuando} onChange={e=>setForm(p=>({...p,cada_cuando:e.target.value}))} opciones={[

        {v:"Cada mes",l:"Cada mes"},{v:"Cada 2 meses",l:"Cada 2 meses"},{v:"Cada año",l:"Cada año"}

      <Campo etiqueta="Notas (opcional)" ayuda="Número de cuenta, póliza, o cualquier dato extra" value={form.notas} onChange={e=>setForm(p=>({...p,notas:e.target.value}))} placeholder="Ej: Póliza #12345, cuenta CLABE..."/>
      <BotonGrande onClick={guardarRecordatorio} disabled={!form.titulo||!form.fecha} icono="✅">Guardar recordatorio</BotonGrande>
      <button onClick={()=>setModalNuevo(false)} style={{width:"100%",background:"none",border:"none",color:"#8FA0B4",fontSize:15,padding:"14px",cursor:"pointer",marginTop:4}}>Cancelar</button>
    </Modal>

    <Modal open={modalSeguro} onClose={()=>setModalSeguro(false)} titulo="Registrar seguro de auto">
      <div style={{background:"#eff6ff",border:"1.5px solid #bfdbfe",borderRadius:10,padding:"12px 14px",marginBottom:16,fontSize:14,color:"#10284A",lineHeight:1.5}}>

      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <Campo etiqueta="Marca" value={segForm.marca} onChange={e=>setSegForm(p=>({...p,marca:e.target.value}))} placeholder="Nissan, Toyota..."/>
        <Campo etiqueta="Modelo" value={segForm.modelo} onChange={e=>setSegForm(p=>({...p,modelo:e.target.value}))} placeholder="Versa, Corolla..."/>

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <Campo etiqueta="Año" type="number" value={segForm.anio} onChange={e=>setSegForm(p=>({...p,anio:e.target.value}))} placeholder="2020" min="1990" max="2027"/>
        <Campo etiqueta="Placas" value={segForm.placas} onChange={e=>setSegForm(p=>({...p,placas:e.target.value}))} placeholder="ABC-123"/>
      </div>
      <Campo etiqueta="¿Con qué aseguradora tienes hoy?" value={segForm.aseguradora} onChange={e=>setSegForm(p=>({...p,aseguradora:e.target.value}))} placeholder="GNP, AXA, Qualitas, HDI..."/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <Campo etiqueta="Lo que pagas al año ($)" type="number" value={segForm.prima} onChange={e=>setSegForm(p=>({...p,prima:e.target.value}))} placeholder="0" min="0" step="100"/>
        <Selector etiqueta="Tipo de cobertura" value={segForm.cobertura} onChange={e=>setSegForm(p=>({...p,cobertura:e.target.value}))} opciones={[{v:"Amplia",l:"Amplia — cubre todo"},{v:"Limitada",l:"Limitada"},{v:"Solo RC",l:"Solo responsabilidad civil"}]}/>

      <Campo etiqueta="Código postal donde guardas el coche" ayuda="Lo usamos para cotizar con las mejores tarifas de tu zona" value={segForm.cp} onChange={e=>setSegForm(p=>({...p,cp:e.target.value}))} placeholder="Ej: 06600" type="tel"/>

      <BotonGrande onClick={guardarSeguro} disabled={!segForm.marca||!segForm.modelo||!segForm.fecha} color="#10284A" icono="🚗">Registrar mi seguro</BotonGrande>

          <div style={{fontSize:20,fontWeight:700,color:"#0a1c35",marginBottom:10}}>¡Solicitud enviada!</div>
          <div style={{fontSize:15,color:"#53647D",lineHeight:1.6}}>Un asesor de UPCO te va a contactar en menos de 24 horas con las mejores opciones para tu coche</div>
        </div>
        :<div>
          {modalCotizar?.auto&&<div style={{background:"#f8fafc",borderRadius:12,padding:"14px",marginBottom:16}}>

            <div style={{display:"flex",gap:16,marginTop:8,flexWrap:"wrap"}}>
              <span style={{fontSize:14,color:"#53647D"}}>🔢 {modalCotizar.auto.placas}</span>
              <span style={{fontSize:14,color:"#53647D"}}>🛡️ Cobertura {modalCotizar.auto.cobertura}</span>
              <span style={{fontSize:14,color:"#53647D"}}>💰 Prima actual: {pesos(modalCotizar.auto.prima)}</span>

            </div>

          <Selector etiqueta="¿Cuándo te podemos llamar?" value={cotForm.mejor_hora} onChange={e=>setCotForm(p=>({...p,mejor_hora:e.target.value}))} opciones={[

            {v:"Noche (17 a 20)",l:"🌆 Noche (17 a 20 hrs)"},{v:"Cualquier hora",l:"📞 A cualquier hora"}
          ]}/>

// ── MÓDULO: PRESUPUESTO ───────────────────────────────────────
function Presupuesto({presupuesto,setPresupuesto,accion,onConsumirAccion}){
  const[modalCat,setModalCat]=useState(false);
  const[editando,setEditando]=useState(null);
  const[editIngreso,setEditIngreso]=useState(false);
  const[nuevoIngreso,setNuevoIngreso]=useState(presupuesto.ingreso);
  const[confirmarBorrar,setConfirmarBorrar]=useState(null);
  const[toast,setToast]=useState({visible:false,msg:""});
  const[form,setForm]=useState({nombre:"",limite:"",gastado:"0",icono:"📦"});
  const mostrarToast=msg=>{setToast({visible:true,msg});setTimeout(()=>setToast({visible:false,msg:""}),2500);};
  const ICONOS=["🏠","🛒","🚗","🎬","💰","💡","🏥","📚","👗","🍽️","🎮","✈️","💊","🐾","💻","📱","⚽","🐶"];
  const totalLimite=presupuesto.categorias.reduce((s,c)=>s+c.limite,0);
  const totalGastado=presupuesto.categorias.reduce((s,c)=>s+c.gastado,0);
  const abrirEditar=c=>{setEditando(c);setForm({nombre:c.nombre,limite:c.limite,gastado:c.gastado,icono:c.icono});setModalCat(true);};
  const abrirNueva=()=>{setEditando(null);setForm({nombre:"",limite:"",gastado:"0",icono:"📦"});setModalCat(true);};
  useEffect(()=>{if(accion==="nueva_categoria"){abrirNueva();onConsumirAccion();}},[accion]);
  const guardar=()=>{
    if(!form.nombre)return;
    if(editando)setPresupuesto(p=>({...p,categorias:p.categorias.map(c=>c.id===editando.id?{...c,...form,limite:Number(form.limite),gastado:Number(form.gastado)}:c)}));
    else setPresupuesto(p=>({...p,categorias:[...p.categorias,{id:Date.now(),...form,limite:Number(form.limite),gastado:Number(form.gastado),color:"#10284A"}]}));
    setModalCat(false);
    mostrarToast(editando?"Categoría actualizada":"¡Categoría guardada!");
  };
  const borrar=id=>{setPresupuesto(p=>({...p,categorias:p.categorias.filter(c=>c.id!==id)}));setConfirmarBorrar(null);mostrarToast("Categoría eliminada");};
  return <div>
    <Toast msg={toast.msg} visible={toast.visible}/>
    <ConfirmModal open={!!confirmarBorrar} onConfirm={()=>borrar(confirmarBorrar?.id)} onCancel={()=>setConfirmarBorrar(null)} texto={`¿Quieres borrar la categoría "${confirmarBorrar?.nombre}"?`}/>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <h2 style={{margin:0,fontSize:22,fontWeight:800,color:"#0a1c35"}}>Presupuesto</h2>
      <button onClick={abrirNueva} style={{background:"#10284A",color:"#fff",border:"none",borderRadius:10,padding:"10px 16px",fontSize:14,fontWeight:600,cursor:"pointer"}}>+ Categoría</button>
    </div>
    <div style={{background:"linear-gradient(135deg,#10284A,#1a3a6e)",borderRadius:16,padding:"20px",marginBottom:16}}>
      <div style={{fontSize:13,color:"rgba(255,255,255,.7)",marginBottom:4,fontWeight:500}}>LO QUE GANAS AL MES</div>
      {editIngreso
        ?<div style={{display:"flex",gap:8,alignItems:"center"}}>
          <input type="number" value={nuevoIngreso} onChange={e=>setNuevoIngreso(Number(e.target.value))} style={{flex:1,padding:"10px 12px",borderRadius:10,border:"none",fontSize:18,fontWeight:700}}/>
          <button onClick={()=>{setPresupuesto(p=>({...p,ingreso:nuevoIngreso}));setEditIngreso(false);mostrarToast("Ingreso actualizado");trackEvent("ingreso_actualizado",{ingreso:nuevoIngreso});}} style={{background:"rgba(255,255,255,.2)",color:"#fff",border:"none",borderRadius:10,padding:"10px 16px",fontSize:15,fontWeight:600,cursor:"pointer"}}>Guardar</button>
        </div>
        :<div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{fontSize:32,fontWeight:800,color:"#fff"}}>{pesos(presupuesto.ingreso)}</div>
          <button onClick={()=>{setNuevoIngreso(presupuesto.ingreso);setEditIngreso(true);}} style={{background:"rgba(255,255,255,.2)",color:"#fff",border:"none",borderRadius:10,padding:"8px 14px",fontSize:14,fontWeight:600,cursor:"pointer"}}>Editar</button>
        </div>
      }
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginTop:16}}>
        {[{l:"Presupuestado",v:pesos(totalLimite)},{l:"Gastado",v:pesos(totalGastado)},{l:"Sin asignar",v:pesos(presupuesto.ingreso-totalLimite)}].map(i=>
          <div key={i.l} style={{background:"rgba(255,255,255,.15)",borderRadius:10,padding:"10px",textAlign:"center"}}>
            <div style={{fontSize:14,fontWeight:700,color:"#fff"}}>{i.v}</div>
            <div style={{fontSize:11,color:"rgba(255,255,255,.7)",marginTop:3}}>{i.l}</div>
          </div>
        )}
      </div>
    </div>
    <div style={{background:"#fffbeb",border:"1.5px solid #fde68a",borderRadius:12,padding:"12px 16px",marginBottom:16,display:"flex",gap:12,alignItems:"flex-start"}}>
      <span style={{fontSize:22}}>💡</span>
      <div>
        <div style={{fontSize:14,fontWeight:700,color:"#92400e",marginBottom:3}}>Regla del 50 / 30 / 20</div>
        <div style={{fontSize:13,color:"#a16207",lineHeight:1.5}}>
          Necesidades <strong>{pesos(presupuesto.ingreso*.5)}</strong> · Gustos <strong>{pesos(presupuesto.ingreso*.3)}</strong> · Ahorro <strong>{pesos(presupuesto.ingreso*.2)}</strong>
        </div>
      </div>
    </div>
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      {presupuesto.categorias.map(c=>{
        const pasado=c.gastado>c.limite;
        return <div key={c.id} style={{background:"#fff",border:`1.5px solid ${pasado?"#fca5a5":"#DDE4EE"}`,borderRadius:14,padding:"16px"}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:50,height:50,borderRadius:14,background:c.color+"20",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,flexShrink:0}}>{c.icono}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                <span style={{fontSize:16,fontWeight:600,color:"#0a1c35"}}>{c.nombre}</span>
                <span style={{fontSize:14,fontWeight:700,color:pasado?"#ef4444":"#53647D"}}>{Math.round(c.gastado/c.limite*100)}%</span>
              </div>
              <Barra valor={c.gastado} max={c.limite} color={pasado?"#ef4444":c.color} alto={8}/>
              <div style={{display:"flex",justifyContent:"space-between",marginTop:6}}>
                <span style={{fontSize:13,color:"#8FA0B4"}}>Gastado: {pesos(c.gastado)}</span>
                <span style={{fontSize:13,color:pasado?"#ef4444":"#8FA0B4"}}>Límite: {pesos(c.limite)}</span>
              </div>
              {pasado&&<div style={{marginTop:6,fontSize:13,color:"#dc2626",fontWeight:600}}>⚠️ Te pasaste por {pesos(c.gastado-c.limite)}</div>}
            </div>
          </div>
          <div style={{display:"flex",gap:10,marginTop:12,paddingTop:12,borderTop:"1px solid #f1f5f9"}}>
            <button onClick={()=>abrirEditar(c)} style={{flex:1,background:"#f1f5f9",color:"#53647D",border:"none",borderRadius:10,padding:"10px",fontSize:14,fontWeight:500,cursor:"pointer"}}>✏️ Editar</button>
            <button onClick={()=>setConfirmarBorrar(c)} style={{background:"#fef2f2",color:"#dc2626",border:"1.5px solid #fca5a5",borderRadius:10,padding:"10px 14px",fontSize:14,fontWeight:500,cursor:"pointer"}}>🗑️</button>
          </div>
        </div>;
      })}
    </div>
    <Modal open={modalCat} onClose={()=>setModalCat(false)} titulo={editando?"Editar categoría":"Nueva categoría"}>
      <Campo etiqueta="¿Cómo se llama?" ayuda="Ej: Comida, Renta, Colegiatura, Gasolina" value={form.nombre} onChange={e=>setForm(p=>({...p,nombre:e.target.value}))} placeholder="Nombre de la categoría"/>
      <div style={{marginBottom:16}}>
        <label style={{display:"block",fontSize:15,fontWeight:600,color:"#374151",marginBottom:8}}>¿Qué ícono le pones?</label>
        <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
          {ICONOS.map(ic=><button key={ic} onClick={()=>setForm(p=>({...p,icono:ic}))}
            style={{width:44,height:44,border:`2px solid ${form.icono===ic?"#10284A":"#DDE4EE"}`,borderRadius:10,background:form.icono===ic?"#eef2ff":"#fff",cursor:"pointer",fontSize:22}}>{ic}</button>)}
        </div>
      </div>
      <Campo etiqueta="¿Cuánto puedes gastar aquí al mes?" ayuda="Este es tu límite para esta categoría" type="number" value={form.limite} onChange={e=>setForm(p=>({...p,limite:e.target.value}))} placeholder="Ej: 5000" min="0" step="100"/>
      <Campo etiqueta="¿Cuánto llevas gastado este mes?" type="number" value={form.gastado} onChange={e=>setForm(p=>({...p,gastado:e.target.value}))} placeholder="0" min="0" step="10"/>
      <BotonGrande onClick={guardar} disabled={!form.nombre} icono="✅">Guardar</BotonGrande>
      <button onClick={()=>setModalCat(false)} style={{width:"100%",background:"none",border:"none",color:"#8FA0B4",fontSize:15,padding:"14px",cursor:"pointer",marginTop:4}}>Cancelar</button>
    </Modal>
  </div>;
}

// ── MÓDULO: COMPRAS ───────────────────────────────────────────
function Compras({listas,setListas,accion,onConsumirAccion}){
  const[vista,setVista]=useState("inicio");
  const[listaActivaId,setListaActivaId]=useState(null);
  const[modalNueva,setModalNueva]=useState(false);
  const[modalProducto,setModalProducto]=useState(false);
  const[modalCerrar,setModalCerrar]=useState(false);
  const[historialId,setHistorialId]=useState(null);
  const[toast,setToast]=useState({visible:false,msg:""});
  const[listaForm,setListaForm]=useState({nombre:"",tienda:"Walmart",limite:""});
  const[prodForm,setProdForm]=useState({nombre:"",cantidad:"1",unidad:"pieza",precio:""});
  const mostrarToast=msg=>{setToast({visible:true,msg});setTimeout(()=>setToast({visible:false,msg:""}),2500);};
  useEffect(()=>{if(accion==="nueva_lista"){setVista("inicio");setModalNueva(true);onConsumirAccion();}},[accion]);
  const listaActiva=listas.find(l=>l.id===listaActivaId);
  const listasAbiertas=listas.filter(l=>l.estado==="abierta");
  const listasCerradas=listas.filter(l=>l.estado==="cerrada");
  const listaHistorial=listas.find(l=>l.id===historialId);
  const TIENDAS=["Walmart","Costco","Soriana","Chedraui","Mercado local","OXXO","Bodega Aurrera","Otro"];
  const totalLista=prods=>prods.reduce((s,p)=>s+p.precio*p.cantidad,0);
  const crearLista=()=>{
    if(!listaForm.nombre)return;
    const nueva={id:Date.now(),nombre:listaForm.nombre,tienda:listaForm.tienda,limite:Number(listaForm.limite)||0,fecha:new Date().toISOString().split("T")[0],estado:"abierta",productos:[]};
    setListas(p=>[...p,nueva]);setListaActivaId(nueva.id);setListaForm({nombre:"",tienda:"Walmart",limite:""});setModalNueva(false);setVista("activa");
  };
  const agregarProducto=()=>{
    if(!prodForm.nombre||!listaActivaId)return;
    setListas(p=>p.map(l=>l.id===listaActivaId?{...l,productos:[...l.productos,{id:Date.now(),nombre:prodForm.nombre,cantidad:Number(prodForm.cantidad)||1,unidad:prodForm.unidad,precio:Number(prodForm.precio)||0,listo:false}]}:l));
    setProdForm({nombre:"",cantidad:"1",unidad:"pieza",precio:""});setModalProducto(false);
  };
  const marcarProducto=pid=>setListas(p=>p.map(l=>l.id===listaActivaId?{...l,productos:l.productos.map(pr=>pr.id===pid?{...pr,listo:!pr.listo}:pr)}:l));
  const quitarProducto=pid=>setListas(p=>p.map(l=>l.id===listaActivaId?{...l,productos:l.productos.filter(pr=>pr.id!==pid)}:l));
  const cerrarLista=()=>{setListas(p=>p.map(l=>l.id===listaActivaId?{...l,estado:"cerrada"}:l));setModalCerrar(false);setVista("inicio");setListaActivaId(null);mostrarToast("¡Compra cerrada y guardada!");};

  if(vista==="inicio") return <div>
    <Toast msg={toast.msg} visible={toast.visible}/>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
      <h2 style={{margin:0,fontSize:22,fontWeight:800,color:"#0a1c35"}}>Mis compras</h2>
      <div style={{display:"flex",gap:8}}>
        <button onClick={()=>setVista("historial")} style={{background:"#f1f5f9",color:"#53647D",border:"none",borderRadius:10,padding:"10px 14px",fontSize:14,fontWeight:500,cursor:"pointer"}}>📋 Anteriores</button>
        <button onClick={()=>setModalNueva(true)} style={{background:"#10b981",color:"#fff",border:"none",borderRadius:10,padding:"10px 14px",fontSize:14,fontWeight:700,cursor:"pointer"}}>+ Nueva lista</button>
      </div>
    </div>
    {listasAbiertas.map(l=>{
      const total=totalLista(l.productos);const pasado=l.limite>0&&total>l.limite;
      return <div key={l.id} onClick={()=>{setListaActivaId(l.id);setVista("activa");}}
        style={{background:"#fff",border:`2px solid ${pasado?"#fca5a5":"#a5f3c0"}`,borderRadius:16,padding:"18px",marginBottom:14,cursor:"pointer"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
          <div>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
              <span style={{fontSize:16,fontWeight:700,color:"#0a1c35"}}>{l.nombre}</span>
              <span style={{background:"#d1fae5",color:"#065f46",fontSize:12,fontWeight:600,padding:"2px 8px",borderRadius:99}}>Activa</span>
            </div>
            <div style={{fontSize:14,color:"#8FA0B4"}}>🏪 {l.tienda} · {l.productos.length} productos</div>
          </div>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:20,fontWeight:800,color:pasado?"#ef4444":"#0a1c35"}}>{pesos(total)}</div>
            {l.limite>0&&<div style={{fontSize:13,color:"#8FA0B4"}}>Límite: {pesos(l.limite)}</div>}
          </div>
        </div>
        {l.limite>0&&<Barra valor={total} max={l.limite} color={pasado?"#ef4444":"#10b981"} alto={6}/>}
        <div style={{marginTop:12,fontSize:14,color:"#10b981",fontWeight:600}}>Toca para continuar comprando →</div>
      </div>;
    })}
    {listasAbiertas.length===0&&<div style={{textAlign:"center",padding:"48px 0",color:"#8FA0B4"}}>
      <div style={{fontSize:48,marginBottom:14}}>🛒</div>
      <div style={{fontSize:18,fontWeight:600,color:"#53647D",marginBottom:8}}>Sin listas activas</div>
      <div style={{fontSize:15,marginBottom:24}}>Crea una lista para tu próxima compra</div>
      <button onClick={()=>setModalNueva(true)} style={{background:"#10b981",color:"#fff",border:"none",borderRadius:12,padding:"14px 24px",fontSize:16,fontWeight:700,cursor:"pointer"}}>+ Crear mi primera lista</button>
    </div>}
    {listasCerradas.length>0&&<div style={{marginTop:8}}>
      <div style={{fontSize:14,fontWeight:700,color:"#8FA0B4",marginBottom:12}}>COMPRAS RECIENTES</div>
      {listasCerradas.slice(-3).reverse().map(l=>{
        const total=totalLista(l.productos);const pasado=l.limite>0&&total>l.limite;
        return <div key={l.id} onClick={()=>{setHistorialId(l.id);setVista("historial");}}
          style={{display:"flex",alignItems:"center",gap:14,background:"#fff",border:"1.5px solid #DDE4EE",borderRadius:14,padding:"14px 16px",marginBottom:10,cursor:"pointer"}}>
          <div style={{width:48,height:48,borderRadius:12,background:"#f1f5f9",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,flexShrink:0}}>🧾</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:15,fontWeight:600,color:"#0a1c35"}}>{l.nombre}</div>
            <div style={{fontSize:13,color:"#8FA0B4"}}>{l.tienda} · {fechaCorta(l.fecha)}</div>
          </div>
          <div style={{textAlign:"right",flexShrink:0}}>
            <div style={{fontSize:16,fontWeight:700,color:pasado?"#ef4444":"#0a1c35"}}>{pesos(total)}</div>
            {l.limite>0&&<div style={{fontSize:12,color:pasado?"#ef4444":"#10b981",fontWeight:600}}>{pasado?"⚠️ Pasado":"✓ En límite"}</div>}
          </div>
        </div>;
      })}
    </div>}
    <Modal open={modalNueva} onClose={()=>setModalNueva(false)} titulo="Nueva lista de compras">
      <Campo etiqueta="¿Cómo se llama esta lista?" ayuda="Ej: Super semanal, Despensa del mes, Cosas del baño" value={listaForm.nombre} onChange={e=>setListaForm(p=>({...p,nombre:e.target.value}))} placeholder="Nombre de la lista..."/>
      <Selector etiqueta="¿En qué tienda vas a comprar?" value={listaForm.tienda} onChange={e=>setListaForm(p=>({...p,tienda:e.target.value}))} opciones={TIENDAS.map(t=>({v:t,l:t}))}/>
      <Campo etiqueta="¿Cuánto puedes gastar? (opcional)" ayuda="Te avisamos si te estás pasando del presupuesto" type="number" value={listaForm.limite} onChange={e=>setListaForm(p=>({...p,limite:e.target.value}))} placeholder="Ej: 1500" min="0" step="50"/>
      <BotonGrande onClick={crearLista} disabled={!listaForm.nombre} color="#10b981" icono="🛒">Crear lista y empezar</BotonGrande>
      <button onClick={()=>setModalNueva(false)} style={{width:"100%",background:"none",border:"none",color:"#8FA0B4",fontSize:15,padding:"14px",cursor:"pointer",marginTop:4}}>Cancelar</button>
    </Modal>
  </div>;

  if(vista==="activa"&&listaActiva){
    const total=totalLista(listaActiva.productos);
    const enCarrito=listaActiva.productos.filter(p=>p.listo).reduce((s,p)=>s+p.precio*p.cantidad,0);
    const pendientes=listaActiva.productos.filter(p=>!p.listo);
    const listos=listaActiva.productos.filter(p=>p.listo);
    const pasado=listaActiva.limite>0&&total>listaActiva.limite;
    return <div>
      <Toast msg={toast.msg} visible={toast.visible}/>
      <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
        <button onClick={()=>setVista("inicio")} style={{border:"none",background:"#f1f5f9",borderRadius:10,width:42,height:42,cursor:"pointer",fontSize:20,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>←</button>

          <div style={{fontSize:14,color:"#8FA0B4"}}>🏪 {listaActiva.tienda}</div>
        </div>
        <button onClick={()=>setModalProducto(true)} style={{background:"#10b981",color:"#fff",border:"none",borderRadius:10,padding:"10px 14px",fontSize:14,fontWeight:700,cursor:"pointer",flexShrink:0}}>+ Producto</button>

          </div>
          {listaActiva.limite>0&&<div style={{textAlign:"right"}}>
            <div style={{fontSize:13,color:"#53647D"}}>Tu límite</div>

          <span style={{fontSize:13,color:"#53647D"}}>{Math.round(total/listaActiva.limite*100)}% del presupuesto</span>

            <div style={{fontSize:16,fontWeight:700,color:"#0a1c35"}}>{pendientes.length}</div>

          <button onClick={()=>marcarProducto(pr.id)} style={{width:30,height:30,borderRadius:8,border:"2px solid #10284A",background:"#fff",cursor:"pointer",flexShrink:0}}/>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:16,fontWeight:600,color:"#0a1c35"}}>{pr.nombre}</div>
            <div style={{fontSize:13,color:"#8FA0B4"}}>{pr.cantidad} {pr.unidad}</div>
          </div>
          <div style={{fontSize:16,fontWeight:700,color:"#0a1c35",flexShrink:0}}>{pesos(pr.precio*pr.cantidad)}</div>
          <button onClick={()=>quitarProducto(pr.id)} style={{border:"none",background:"none",cursor:"pointer",color:"#d1d5db",fontSize:22,lineHeight:1,padding:0,flexShrink:0}}>×</button>
        </div>)}
      </div>}
      {listos.length>0&&<div style={{marginBottom:16}}>
        <div style={{fontSize:14,fontWeight:700,color:"#8FA0B4",marginBottom:10}}>EN EL CARRITO ({listos.length})</div>
        {listos.map(pr=><div key={pr.id} style={{display:"flex",alignItems:"center",gap:12,background:"#f0fdf4",border:"1.5px solid #bbf7d0",borderRadius:12,padding:"14px",marginBottom:8,opacity:.85}}>
          <button onClick={()=>marcarProducto(pr.id)} style={{width:30,height:30,borderRadius:8,border:"none",background:"#22c55e",cursor:"pointer",flexShrink:0,fontSize:16,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center"}}>✓</button>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:16,fontWeight:500,color:"#53647D",textDecoration:"line-through"}}>{pr.nombre}</div>
            <div style={{fontSize:13,color:"#8FA0B4"}}>{pr.cantidad} {pr.unidad}</div>
          </div>
          <div style={{fontSize:15,fontWeight:600,color:"#16a34a",flexShrink:0}}>{pesos(pr.precio*pr.cantidad)}</div>
        </div>)}
      </div>}
      {listaActiva.productos.length===0&&<div style={{textAlign:"center",padding:"32px 0",color:"#8FA0B4"}}>
        <div style={{fontSize:36,marginBottom:10}}>📝</div>

      {listaActiva.productos.length>0&&<button onClick={()=>setModalCerrar(true)}

        🏁 Cerrar compra — {pesos(total)}
      </button>}
      <Modal open={modalProducto} onClose={()=>setModalProducto(false)} titulo="Agregar producto">
        <Campo etiqueta="¿Qué producto es?" value={prodForm.nombre} onChange={e=>setProdForm(p=>({...p,nombre:e.target.value}))} placeholder="Leche, aguacates, jabón..."/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <Campo etiqueta="¿Cuánto?" type="number" value={prodForm.cantidad} onChange={e=>setProdForm(p=>({...p,cantidad:e.target.value}))} min="0.1" step="0.5"/>
          <Selector etiqueta="Unidad" value={prodForm.unidad} onChange={e=>setProdForm(p=>({...p,unidad:e.target.value}))} opciones={[{v:"pieza",l:"Pieza"},{v:"kg",l:"Kilogramo"},{v:"litro",l:"Litro"},{v:"gramos",l:"Gramos"},{v:"paquete",l:"Paquete"},{v:"caja",l:"Caja"}]}/>
        </div>
        <Campo etiqueta="¿Cuánto cuesta?" ayuda="El precio aproximado — para saber cuánto llevar" type="number" value={prodForm.precio} onChange={e=>setProdForm(p=>({...p,precio:e.target.value}))} placeholder="0" min="0" step="1"/>

          {totalLista(listaActiva.productos)+Number(prodForm.precio)*Number(prodForm.cantidad)>listaActiva.limite?"⚠️":"✅"} El total quedaría en {pesos(totalLista(listaActiva.productos)+Number(prodForm.precio)*Number(prodForm.cantidad))}
        </div>}
        <BotonGrande onClick={agregarProducto} disabled={!prodForm.nombre} color="#10b981" icono="➕">Agregar a la lista</BotonGrande>
        <button onClick={()=>setModalProducto(false)} style={{width:"100%",background:"none",border:"none",color:"#8FA0B4",fontSize:15,padding:"14px",cursor:"pointer",marginTop:4}}>Cancelar</button>
      </Modal>
      <Modal open={modalCerrar} onClose={()=>setModalCerrar(false)} titulo="Resumen de tu compra">
        <div style={{textAlign:"center",padding:"8px 0 16px"}}>
          <div style={{fontSize:48,marginBottom:10}}>🧾</div>
          <div style={{fontSize:15,color:"#53647D",marginBottom:4}}>{listaActiva.nombre} · {listaActiva.tienda}</div>
          <div style={{fontSize:36,fontWeight:800,color:"#0a1c35",marginBottom:4}}>{pesos(total)}</div>
          {listaActiva.limite>0&&<div style={{fontSize:15,color:pasado?"#dc2626":"#16a34a",fontWeight:600}}>{pasado?`⚠️ Te pasaste por ${pesos(total-listaActiva.limite)}`:`✅ Dentro de tu límite de ${pesos(listaActiva.limite)}`}</div>}
        </div>
        <div style={{background:"#f8fafc",borderRadius:12,padding:"14px",marginBottom:16,maxHeight:200,overflowY:"auto"}}>
          {listaActiva.productos.map(pr=><div key={pr.id} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid #f1f5f9",fontSize:14}}>
            <span style={{color:pr.listo?"#0a1c35":"#8FA0B4"}}>{pr.listo?"✓":"○"} {pr.nombre} ×{pr.cantidad}</span>
            <span style={{fontWeight:600,color:pr.listo?"#0a1c35":"#8FA0B4"}}>{pesos(pr.precio*pr.cantidad)}</span>
          </div>)}
          <div style={{display:"flex",justifyContent:"space-between",paddingTop:10,marginTop:4,fontWeight:800,fontSize:16,color:"#0a1c35"}}>
            <span>Total</span><span>{pesos(total)}</span>
          </div>
        </div>
        <BotonGrande onClick={cerrarLista} color="#10b981" icono="✅">Confirmar y guardar compra</BotonGrande>
        <button onClick={()=>setModalCerrar(false)} style={{width:"100%",background:"none",border:"none",color:"#8FA0B4",fontSize:15,padding:"14px",cursor:"pointer",marginTop:4}}>Seguir comprando</button>
      </Modal>
    </div>;
  }

  if(vista==="historial") return <div>
    <Toast msg={toast.msg} visible={toast.visible}/>
    <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:20}}>
      <button onClick={()=>{setVista("inicio");setHistorialId(null);}} style={{border:"none",background:"#f1f5f9",borderRadius:10,width:42,height:42,cursor:"pointer",fontSize:20,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>←</button>
      <h2 style={{margin:0,fontSize:20,fontWeight:700,color:"#0a1c35"}}>{historialId&&listaHistorial?"Detalle de compra":"Compras anteriores"}</h2>
    </div>
    {historialId&&listaHistorial?<div>
      <div style={{background:"#fff",border:"1.5px solid #DDE4EE",borderRadius:14,padding:"16px",marginBottom:14}}>
        <div style={{fontSize:18,fontWeight:700,color:"#0a1c35",marginBottom:4}}>{listaHistorial.nombre}</div>
        <div style={{fontSize:14,color:"#8FA0B4",marginBottom:14}}>🏪 {listaHistorial.tienda} · {fechaCorta(listaHistorial.fecha)}</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <div style={{background:"#f8fafc",borderRadius:10,padding:"12px",textAlign:"center"}}>
            <div style={{fontSize:22,fontWeight:800,color:"#0a1c35"}}>{pesos(totalLista(listaHistorial.productos))}</div>
            <div style={{fontSize:13,color:"#8FA0B4",marginTop:3}}>Total gastado</div>
          </div>
          <div style={{background:"#f8fafc",borderRadius:10,padding:"12px",textAlign:"center"}}>
            <div style={{fontSize:22,fontWeight:800,color:totalLista(listaHistorial.productos)>listaHistorial.limite?"#ef4444":"#10b981"}}>{listaHistorial.limite>0?pesos(listaHistorial.limite):"—"}</div>
            <div style={{fontSize:13,color:"#8FA0B4",marginTop:3}}>Presupuesto</div>
          </div>
        </div>
      </div>
      {listaHistorial.productos.map(pr=><div key={pr.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",background:"#fff",border:"1.5px solid #DDE4EE",borderRadius:12,padding:"12px 16px",marginBottom:8}}>
        <div>
          <div style={{fontSize:15,fontWeight:600,color:"#0a1c35"}}>{pr.nombre}</div>
          <div style={{fontSize:13,color:"#8FA0B4"}}>{pr.cantidad} {pr.unidad} × {pesos(pr.precio)}</div>
        </div>
        <div style={{fontSize:16,fontWeight:700,color:"#0a1c35"}}>{pesos(pr.precio*pr.cantidad)}</div>
      </div>)}
      <div style={{background:"#0a1c35",borderRadius:12,padding:"14px 18px",display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:4}}>
        <span style={{fontSize:16,fontWeight:600,color:"#fff"}}>Total</span>
        <span style={{fontSize:20,fontWeight:800,color:"#fff"}}>{pesos(totalLista(listaHistorial.productos))}</span>
      </div>
    </div>:<div>
      {listasCerradas.length===0&&<div style={{textAlign:"center",padding:"48px 0",color:"#8FA0B4"}}>
        <div style={{fontSize:40,marginBottom:10}}>🧾</div><div style={{fontSize:16}}>Sin compras anteriores todavía</div>
      </div>}
      {listasCerradas.slice().reverse().map(l=>{
        const total=totalLista(l.productos);const pasado=l.limite>0&&total>l.limite;
        return <div key={l.id} onClick={()=>setHistorialId(l.id)} style={{display:"flex",alignItems:"center",gap:14,background:"#fff",border:"1.5px solid #DDE4EE",borderRadius:14,padding:"14px 16px",marginBottom:10,cursor:"pointer"}}>
          <div style={{width:50,height:50,borderRadius:12,background:"#f1f5f9",display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,flexShrink:0}}>🧾</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:15,fontWeight:600,color:"#0a1c35"}}>{l.nombre}</div>
            <div style={{fontSize:13,color:"#8FA0B4"}}>{l.tienda} · {fechaCorta(l.fecha)} · {l.productos.length} productos</div>
          </div>
          <div style={{textAlign:"right",flexShrink:0}}>
            <div style={{fontSize:17,fontWeight:700,color:pasado?"#ef4444":"#0a1c35"}}>{pesos(total)}</div>
            {l.limite>0&&<div style={{fontSize:12,color:pasado?"#ef4444":"#10b981",fontWeight:600,marginTop:2}}>{pasado?"⚠️ Pasado":"✓ En límite"}</div>}
          </div>
        </div>;
      })}
    </div>}
  </div>;
  return null;
}

// ── MÓDULO: METAS ─────────────────────────────────────────────
function Metas({metas,setMetas,accion,onConsumirAccion}){
  const[modalNueva,setModalNueva]=useState(false);
  const[modalAbonar,setModalAbonar]=useState(null);
  const[abono,setAbono]=useState("");
  const[confirmarBorrar,setConfirmarBorrar]=useState(null);
  const[toast,setToast]=useState({visible:false,msg:""});
  const[form,setForm]=useState({nombre:"",meta:"",ahorrado:"0",fecha_limite:"",icono:"🎯",color:"#10284A"});
  const mostrarToast=msg=>{setToast({visible:true,msg});setTimeout(()=>setToast({visible:false,msg:""}),2500);};
  useEffect(()=>{if(accion==="nueva_meta"){setModalNueva(true);onConsumirAccion();}},[accion]);
  const ICONOS=["🎯","✈️","🏠","🚗","💻","📱","🎓","💍","🌴","🛡️","💊","🐣","⚽","🎸","🐶","🌎"];
  const guardar=()=>{
    if(!form.nombre||!form.meta)return;
    setMetas(p=>[...p,{...form,id:Date.now(),meta:Number(form.meta),ahorrado:Number(form.ahorrado)||0}]);
    trackEvent("meta_creada",{nombre:form.nombre,meta:Number(form.meta),ahorrado:Number(form.ahorrado)||0,fecha_limite:form.fecha_limite});
    setForm({nombre:"",meta:"",ahorrado:"0",fecha_limite:"",icono:"🎯",color:"#10284A"});setModalNueva(false);mostrarToast("¡Meta guardada!");
  };
  const abonar=()=>{
    if(!abono||Number(abono)<=0)return;
    setMetas(p=>p.map(g=>g.id===modalAbonar.id?{...g,ahorrado:g.ahorrado+Number(abono)}:g));
    trackEvent("abono_meta",{meta:modalAbonar.nombre,abono:Number(abono),ahorrado_nuevo:modalAbonar.ahorrado+Number(abono),objetivo:modalAbonar.meta});
    mostrarToast(`¡Abono de ${pesos(Number(abono))} registrado!`);setAbono("");setModalAbonar(null);
  };
  const borrar=id=>{setMetas(p=>p.filter(g=>g.id!==id));setConfirmarBorrar(null);mostrarToast("Meta eliminada");};
  return <div>
    <Toast msg={toast.msg} visible={toast.visible}/>
    <ConfirmModal open={!!confirmarBorrar} onConfirm={()=>borrar(confirmarBorrar?.id)} onCancel={()=>setConfirmarBorrar(null)} texto={`¿Quieres borrar la meta "${confirmarBorrar?.nombre}"?`}/>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
      <h2 style={{margin:0,fontSize:22,fontWeight:800,color:"#0a1c35"}}>Mis metas</h2>
      <button onClick={()=>setModalNueva(true)} style={{background:"#1a3a6e",color:"#fff",border:"none",borderRadius:10,padding:"10px 16px",fontSize:14,fontWeight:700,cursor:"pointer"}}>+ Nueva meta</button>
    </div>
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      {metas.length===0&&<div style={{textAlign:"center",padding:"48px 0",color:"#8FA0B4"}}>
        <div style={{fontSize:48,marginBottom:14}}>🎯</div>
        <div style={{fontSize:18,fontWeight:600,color:"#53647D",marginBottom:8}}>Sin metas todavía</div>
        <div style={{fontSize:15,marginBottom:24}}>¿Para qué quieres ahorrar?</div>
        <button onClick={()=>setModalNueva(true)} style={{background:"#1a3a6e",color:"#fff",border:"none",borderRadius:12,padding:"14px 24px",fontSize:16,fontWeight:700,cursor:"pointer"}}>Crear mi primera meta</button>
      </div>}
      {metas.map(g=>{
        const p=Math.min(100,Math.round(g.ahorrado/g.meta*100));
        const falta=g.meta-g.ahorrado;
        const diasL=g.fecha_limite?diasPara(g.fecha_limite):null;
        const mesesL=diasL?Math.max(1,Math.ceil(diasL/30)):null;
        const mensual=mesesL&&falta>0?Math.ceil(falta/mesesL):0;
        return <div key={g.id} style={{background:"#fff",border:"1.5px solid #DDE4EE",borderRadius:16,padding:"18px"}}>
          <div style={{display:"flex",gap:14,alignItems:"flex-start"}}>
            <div style={{width:56,height:56,borderRadius:16,background:g.color+"20",display:"flex",alignItems:"center",justifyContent:"center",fontSize:30,flexShrink:0}}>{g.icono}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div style={{fontSize:17,fontWeight:700,color:"#0a1c35"}}>{g.nombre}</div>
                <div style={{fontSize:20,fontWeight:800,color:p>=100?"#10b981":g.color}}>{p}%</div>
              </div>
              {g.fecha_limite&&<div style={{fontSize:13,color:"#8FA0B4",marginTop:2}}>📅 {fechaCorta(g.fecha_limite)}{diasL>0?` · faltan ${diasL} días`:""}</div>}
              <div style={{margin:"12px 0 6px"}}><Barra valor={g.ahorrado} max={g.meta} color={p>=100?"#10b981":g.color} alto={10}/></div>
              <div style={{display:"flex",justifyContent:"space-between"}}>
                <span style={{fontSize:14,color:"#53647D"}}>Ahorrado: <strong>{pesos(g.ahorrado)}</strong></span>
                <span style={{fontSize:14,color:"#53647D"}}>Meta: <strong>{pesos(g.meta)}</strong></span>
              </div>
              {falta>0&&mensual>0&&<div style={{marginTop:10,background:g.color+"12",borderRadius:10,padding:"8px 12px"}}>
                <span style={{fontSize:14,color:g.color,fontWeight:600}}>💡 Ahorra {pesos(mensual)} al mes para llegar a tiempo</span>
              </div>}
              {p>=100&&<div style={{marginTop:10,background:"#f0fdf4",borderRadius:10,padding:"8px 12px"}}>
                <span style={{fontSize:15,color:"#16a34a",fontWeight:700}}>🎉 ¡Meta lograda! ¡Felicidades!</span>
              </div>}
            </div>
          </div>
          <div style={{display:"flex",gap:10,marginTop:14,paddingTop:14,borderTop:"1px solid #f1f5f9"}}>
            <button onClick={()=>{setModalAbonar(g);setAbono("");}} style={{flex:1,background:"#f0fdf4",color:"#16a34a",border:"1.5px solid #86efac",borderRadius:10,padding:"12px",fontSize:15,fontWeight:700,cursor:"pointer"}}>💰 Abonar</button>
            <button onClick={()=>setConfirmarBorrar(g)} style={{background:"#fef2f2",color:"#dc2626",border:"1.5px solid #fca5a5",borderRadius:10,padding:"12px 16px",fontSize:15,cursor:"pointer"}}>🗑️</button>
          </div>
        </div>;
      })}
    </div>
    <Modal open={modalNueva} onClose={()=>setModalNueva(false)} titulo="Nueva meta de ahorro">
      <Campo etiqueta="¿Para qué estás ahorrando?" ayuda="Ej: Vacaciones, enganche de casa, fondo de emergencia" value={form.nombre} onChange={e=>setForm(p=>({...p,nombre:e.target.value}))} placeholder="El nombre de tu meta..."/>
      <div style={{marginBottom:16}}>
        <label style={{display:"block",fontSize:15,fontWeight:600,color:"#374151",marginBottom:8}}>¿Qué ícono le pones?</label>
        <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
          {ICONOS.map(ic=><button key={ic} onClick={()=>setForm(p=>({...p,icono:ic}))}
            style={{width:46,height:46,border:`2px solid ${form.icono===ic?"#10284A":"#DDE4EE"}`,borderRadius:10,background:form.icono===ic?"#eef2ff":"#fff",cursor:"pointer",fontSize:24}}>{ic}</button>)}
        </div>
      </div>
      <Campo etiqueta="¿Cuánto necesitas juntar?" ayuda="El total que quieres tener al final" type="number" value={form.meta} onChange={e=>setForm(p=>({...p,meta:e.target.value}))} placeholder="Ej: 20000" min="1" step="1000"/>
      <Campo etiqueta="¿Cuánto ya tienes ahorrado?" type="number" value={form.ahorrado} onChange={e=>setForm(p=>({...p,ahorrado:e.target.value}))} placeholder="0 si estás empezando de cero" min="0" step="100"/>
      <Campo etiqueta="¿Para cuándo quieres lograrlo? (opcional)" type="date" value={form.fecha_limite} onChange={e=>setForm(p=>({...p,fecha_limite:e.target.value}))}/>
      <BotonGrande onClick={guardar} disabled={!form.nombre||!form.meta} color="#1a3a6e" icono="🎯">Guardar mi meta</BotonGrande>
      <button onClick={()=>setModalNueva(false)} style={{width:"100%",background:"none",border:"none",color:"#8FA0B4",fontSize:15,padding:"14px",cursor:"pointer",marginTop:4}}>Cancelar</button>
    </Modal>
    <Modal open={!!modalAbonar} onClose={()=>setModalAbonar(null)} titulo={`Abonar a: ${modalAbonar?.nombre}`}>
      {modalAbonar&&<>
        <div style={{background:"#f8fafc",borderRadius:12,padding:"14px",marginBottom:16}}>
          <div style={{fontSize:14,color:"#53647D",marginBottom:4}}>Lo que llevas ahorrado</div>
          <div style={{fontSize:28,fontWeight:800,color:"#0a1c35",marginBottom:8}}>{pesos(modalAbonar.ahorrado)}</div>
          <Barra valor={modalAbonar.ahorrado} max={modalAbonar.meta} color={modalAbonar.color} alto={8}/>
          <div style={{fontSize:14,color:"#8FA0B4",marginTop:6}}>Te falta: {pesos(modalAbonar.meta-modalAbonar.ahorrado)}</div>
        </div>
        <Campo etiqueta="¿Cuánto vas a abonar hoy?" ayuda="El dinero que estás apartando para esta meta" type="number" value={abono} onChange={e=>setAbono(e.target.value)} placeholder="Ej: 500" min="1" step="100"/>
        <BotonGrande onClick={abonar} disabled={!abono||Number(abono)<=0} color="#10b981" icono="💰">Registrar mi abono</BotonGrande>
        <button onClick={()=>setModalAbonar(null)} style={{width:"100%",background:"none",border:"none",color:"#8FA0B4",fontSize:15,padding:"14px",cursor:"pointer",marginTop:4}}>Cancelar</button>
      </>}
    </Modal>
  </div>;
}

// ── MÓDULO: MI DINERO (contenedor con 4 subsecciones) ─────────
function MiDinero({recordatorios,setRecordatorios,presupuesto,setPresupuesto,metas,setMetas,listas,setListas,accion,onConsumirAccion}){
  const SUB_INICIAL=accion==="nueva_categoria"?"presupuesto":accion==="nueva_meta"?"metas":accion==="nueva_lista"?"compras":"pagos";
  const[sub,setSub]=useState(SUB_INICIAL);
  useEffect(()=>{
    if(accion==="nueva_categoria")setSub("presupuesto");
    if(accion==="nueva_meta")setSub("metas");
    if(accion==="nueva_lista")setSub("compras");
    if(accion==="nuevo_pago"||accion==="nuevo_seguro_auto")setSub("pagos");
  },[accion]);
  const TABS=[["pagos","Mis pagos"],["presupuesto","Presupuesto"],["metas","Metas"],["compras","Compras"]];
  return <div>
    <div style={{display:"flex",gap:6,marginBottom:18,overflowX:"auto",paddingBottom:2}}>
      {TABS.map(([v,l])=><button key={v} onClick={()=>setSub(v)}
        style={{padding:"10px 16px",borderRadius:99,border:"1.5px solid",fontSize:14,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap",borderColor:sub===v?"#10284A":"#DDE4EE",background:sub===v?"#10284A":"#fff",color:sub===v?"#fff":"#53647D"}}>
        {l}
      </button>)}
    </div>
    {sub==="pagos"&&<Recordatorios recordatorios={recordatorios} setRecordatorios={setRecordatorios} accion={accion} onConsumirAccion={onConsumirAccion}/>}
    {sub==="presupuesto"&&<Presupuesto presupuesto={presupuesto} setPresupuesto={setPresupuesto} accion={accion} onConsumirAccion={onConsumirAccion}/>}
    {sub==="metas"&&<Metas metas={metas} setMetas={setMetas} accion={accion} onConsumirAccion={onConsumirAccion}/>}
    {sub==="compras"&&<Compras listas={listas} setListas={setListas} accion={accion} onConsumirAccion={onConsumirAccion}/>}
  </div>;
}

// ── MÓDULO: MI HOGAR ──────────────────────────────────────────
const SERVICIOS_HOGAR=[
  {tipo:"luz",icono:"luz",nombre:"Luz (CFE)",color:"#f59e0b"},
  {tipo:"agua",icono:"agua",nombre:"Agua",color:"#06b6d4"},
  {tipo:"gas",icono:"gas",nombre:"Gas",color:"#ef4444"},
  {tipo:"renta",icono:"hogar",nombre:"Renta / Hipoteca",color:"#10284A"},
];
function MiHogar({recordatorios,setRecordatorios,accion,onConsumirAccion}){
  const[modalNuevo,setModalNuevo]=useState(false);
  const[confirmarBorrar,setConfirmarBorrar]=useState(null);
  const[toast,setToast]=useState({visible:false,msg:""});
  const[form,setForm]=useState({titulo:"",tipo:"luz",fecha:"",monto:"",cada_cuando:"Cada mes",notas:""});
  const mostrarToast=msg=>{setToast({visible:true,msg});setTimeout(()=>setToast({visible:false,msg:""}),2500);};
  useEffect(()=>{if(accion==="nuevo_servicio_hogar"){setModalNuevo(true);onConsumirAccion();}},[accion]);

  const hogar=recordatorios.filter(r=>r.area==="hogar").sort((a,b)=>diasPara(a.fecha)-diasPara(b.fecha));
  const proximoDeTipo=tipo=>hogar.filter(r=>r.tipo===tipo).sort((a,b)=>diasPara(a.fecha)-diasPara(b.fecha))[0];

  const guardar=()=>{
    if(!form.titulo||!form.fecha)return;
    setRecordatorios(p=>[...p,{...form,id:Date.now(),area:"hogar",monto:Number(form.monto)||0}]);
    setForm({titulo:"",tipo:"luz",fecha:"",monto:"",cada_cuando:"Cada mes",notas:""});
    setModalNuevo(false);
    mostrarToast("¡Recordatorio del hogar guardado!");
  };
  const borrar=id=>{setRecordatorios(p=>p.filter(r=>r.id!==id));setConfirmarBorrar(null);mostrarToast("Recordatorio eliminado");};

  return <div>
    <Toast msg={toast.msg} visible={toast.visible}/>
    <ConfirmModal open={!!confirmarBorrar} onConfirm={()=>borrar(confirmarBorrar?.id)} onCancel={()=>setConfirmarBorrar(null)} texto={`¿Quieres borrar "${confirmarBorrar?.titulo}"?`}/>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
      <h2 style={{margin:0,fontSize:22,fontWeight:800,color:"#0a1c35"}}>Mi hogar</h2>
      <button onClick={()=>setModalNuevo(true)} style={{background:"#f59e0b",color:"#fff",border:"none",borderRadius:10,padding:"10px 14px",fontSize:14,fontWeight:600,cursor:"pointer"}}>+ Agregar</button>
    </div>

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:20}}>
      {SERVICIOS_HOGAR.map(s=>{
        const prox=proximoDeTipo(s.tipo);
        return <div key={s.tipo} style={{background:"#fff",border:"1.5px solid #DDE4EE",borderRadius:16,padding:"16px",display:"flex",flexDirection:"column",gap:10}}>
          <div style={{width:46,height:46,borderRadius:14,background:s.color+"20",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`0 4px 10px ${s.color}22`}}><Ico name={s.icono} size={24} color={s.color} stroke={2.2}/></div>
          <div style={{fontSize:15,fontWeight:700,color:"#0a1c35"}}>{s.nombre}</div>
          {prox?<div>
            <div style={{fontSize:13,color:"#8FA0B4"}}>Próximo: {fechaCorta(prox.fecha)}</div>
            {prox.monto>0&&<div style={{fontSize:15,fontWeight:700,color:"#0a1c35",marginTop:2}}>{pesos(prox.monto)}</div>}
          </div>:<div style={{fontSize:13,color:"#8FA0B4"}}>Sin recordatorio</div>}
        </div>;
      })}
    </div>

    <div style={{fontSize:14,fontWeight:700,color:"#8FA0B4",marginBottom:12}}>RECORDATORIOS DEL HOGAR</div>
    <div style={{display:"flex",flexDirection:"column",gap:12}}>
      {hogar.length===0&&<div style={{textAlign:"center",padding:"40px 0",color:"#8FA0B4"}}>
        <div style={{fontSize:40,marginBottom:10}}>🏡</div>
        <div style={{fontSize:16}}>Sin recordatorios del hogar todavía</div>
      </div>}
      {hogar.map(r=>{
        const dias=diasPara(r.fecha),u=urgencia(dias);
        return <div key={r.id} style={{background:"#fff",borderRadius:14,border:`1.5px solid ${u.borde}`,padding:"16px",borderLeft:`5px solid ${u.dot}`}}>
          <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
            <div style={{width:50,height:50,borderRadius:12,background:u.fondo,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><IcoTipo tipo={r.tipo} size={26} color={u.texto}/></div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:16,fontWeight:700,color:"#0a1c35",marginBottom:3}}>{r.titulo}</div>
              <div style={{fontSize:14,color:"#8FA0B4",marginBottom:4}}>{fechaLarga(r.fecha)} · {r.cada_cuando}</div>
              {r.notas&&<div style={{fontSize:13,color:"#53647D",fontStyle:"italic"}}>{r.notas}</div>}
            </div>
            <div style={{textAlign:"right",flexShrink:0}}>
              {r.monto>0&&<div style={{fontSize:17,fontWeight:800,color:"#0a1c35"}}>{pesos(r.monto)}</div>}
              <div style={{marginTop:4,background:u.fondo,color:u.texto,borderRadius:99,padding:"3px 10px",fontSize:13,fontWeight:700,display:"inline-block"}}>{u.etiqueta}</div>
            </div>
          </div>
          <div style={{display:"flex",gap:10,marginTop:14,paddingTop:12,borderTop:"1px solid #f1f5f9"}}>
            <button onClick={()=>setConfirmarBorrar(r)} style={{background:"#fef2f2",color:"#dc2626",border:"1.5px solid #fca5a5",borderRadius:10,padding:"10px 16px",fontSize:14,fontWeight:600,cursor:"pointer"}}>🗑️ Borrar</button>
          </div>
        </div>;

      <Selector etiqueta="¿Qué servicio es?" value={form.tipo} onChange={e=>setForm(p=>({...p,tipo:e.target.value}))} opciones={[
        {v:"luz",l:"💡 Luz"},{v:"agua",l:"🚰 Agua"},{v:"gas",l:"🔥 Gas"},{v:"renta",l:"🏠 Renta / Hipoteca"},{v:"servicio",l:"📌 Otro servicio del hogar"}
      ]}/>
      <Campo etiqueta="¿En qué fecha vence o hay que pagar?" type="date" value={form.fecha} onChange={e=>setForm(p=>({...p,fecha:e.target.value}))}/>
      <Campo etiqueta="¿Cuánto hay que pagar? (en pesos)" ayuda="Déjalo en 0 si no sabes el monto exacto" type="number" value={form.monto} onChange={e=>setForm(p=>({...p,monto:e.target.value}))} placeholder="0" min="0" step="10"/>
      <Selector etiqueta="¿Cada cuánto se repite?" value={form.cada_cuando} onChange={e=>setForm(p=>({...p,cada_cuando:e.target.value}))} opciones={[
        {v:"Una sola vez",l:"Una sola vez"},{v:"Cada mes",l:"Cada mes"},{v:"Cada 2 meses",l:"Cada 2 meses"},{v:"Cada año",l:"Cada año"}
      ]}/>
      <Campo etiqueta="Notas (opcional)" value={form.notas} onChange={e=>setForm(p=>({...p,notas:e.target.value}))} placeholder="Ej: Número de medidor, contrato..."/>
      <BotonGrande onClick={guardar} disabled={!form.titulo||!form.fecha} color="#f59e0b" icono="✅">Guardar recordatorio</BotonGrande>
      <button onClick={()=>setModalNuevo(false)} style={{width:"100%",background:"none",border:"none",color:"#8FA0B4",fontSize:15,padding:"14px",cursor:"pointer",marginTop:4}}>Cancelar</button>
    </Modal>
  </div>;
}

// ── MÓDULO: MI AUTO ───────────────────────────────────────────
function terminacion(placas){const d=(placas||"").match(/\d/g);return d?d[d.length-1]:null;}
function diaNoCircula(placas){
  const t=terminacion(placas);
  if(!t)return null;
  return HOY_NO_CIRCULA.find(h=>h.terminaciones.includes(t))?.dia||null;
}
function MiAuto({autos,setAutos,accion,onConsumirAccion}){
  const[autoActivoId,setAutoActivoId]=useState(autos[0]?.id||null);
  const[modalAuto,setModalAuto]=useState(false);
  const[modalServicio,setModalServicio]=useState(false);
  const[modalCotizar,setModalCotizar]=useState(false);
  const[leadEnviado,setLeadEnviado]=useState(false);
  const[confirmarBorrar,setConfirmarBorrar]=useState(null);
  const[toast,setToast]=useState({visible:false,msg:""});
  const[form,setForm]=useState({marca:"",modelo:"",anio:"",placas:"",color:"",km_actual:"",km_proximo_servicio:""});
  const[servForm,setServForm]=useState({tipo:"Cambio de aceite",fecha:"",km:"",costo:""});
  const[cotForm,setCotForm]=useState({nombre:"",telefono:"",cp:"",email:"",mejor_hora:"Mañana (9 a 12)"});
  const mostrarToast=msg=>{setToast({visible:true,msg});setTimeout(()=>setToast({visible:false,msg:""}),2500);};
  useEffect(()=>{if(accion==="nuevo_auto"){setForm({marca:"",modelo:"",anio:"",placas:"",color:"",km_actual:"",km_proximo_servicio:""});setModalAuto(true);onConsumirAccion();}},[accion]);

  const autoActivo=autos.find(a=>a.id===autoActivoId)||autos[0];

  const guardarAuto=()=>{
    if(!form.marca||!form.modelo||!form.placas)return;
    if(autos.length>=5){mostrarToast("Ya tienes 5 autos registrados — el máximo");return;}
    const nuevo={id:Date.now(),...form,km_actual:Number(form.km_actual)||0,km_proximo_servicio:Number(form.km_proximo_servicio)||0,historial:[]};
    setAutos(p=>[...p,nuevo]);setAutoActivoId(nuevo.id);setModalAuto(false);mostrarToast("¡Auto registrado!");
  };
  const borrarAuto=id=>{setAutos(p=>p.filter(a=>a.id!==id));setConfirmarBorrar(null);mostrarToast("Auto eliminado");};
  const guardarServicio=()=>{
    if(!servForm.fecha||!autoActivo)return;
    setAutos(p=>p.map(a=>a.id===autoActivo.id?{...a,km_actual:Number(servForm.km)||a.km_actual,historial:[{id:Date.now(),...servForm,km:Number(servForm.km)||a.km_actual,costo:Number(servForm.costo)||0},...a.historial]}:a));
    setServForm({tipo:"Cambio de aceite",fecha:"",km:"",costo:""});setModalServicio(false);mostrarToast("¡Servicio registrado!");
  };
  const enviarCotizacion=()=>{
    if(!cotForm.nombre||!cotForm.telefono||!cotForm.cp)return;
    trackEvent("lead_seguro_auto",{origen:"mi_auto",auto:{marca:autoActivo.marca,modelo:autoActivo.modelo,anio:autoActivo.anio,placas:autoActivo.placas},contacto:cotForm});
    setLeadEnviado(true);
    setTimeout(()=>{setLeadEnviado(false);setModalCotizar(false);setCotForm({nombre:"",telefono:"",cp:"",email:"",mejor_hora:"Mañana (9 a 12)"});},3000);
  };

  if(autos.length===0)return <div>
    <Toast msg={toast.msg} visible={toast.visible}/>
    <h2 style={{margin:"0 0 16px",fontSize:22,fontWeight:800,color:"#0a1c35"}}>Mi auto</h2>
    <div style={{textAlign:"center",padding:"48px 0",color:"#8FA0B4"}}>
      <div style={{fontSize:48,marginBottom:14}}>🚗</div>
      <div style={{fontSize:18,fontWeight:600,color:"#53647D",marginBottom:8}}>Sin autos registrados</div>
      <div style={{fontSize:15,marginBottom:24}}>Registra tu auto para ver Hoy No Circula, verificación y mantenimiento</div>
      <button onClick={()=>setModalAuto(true)} style={{background:"#10284A",color:"#fff",border:"none",borderRadius:12,padding:"14px 24px",fontSize:16,fontWeight:700,cursor:"pointer"}}>+ Registrar mi auto</button>
    </div>

function ConversorLineal({titulo,icono,unidades,colorAcento="#10284A"}){
  const[valor,setValor]=useState("1");
  const[de,setDe]=useState(unidades[0].v);
  const[a,setA]=useState(unidades[1].v);
  const fDe=unidades.find(u=>u.v===de).f, fA=unidades.find(u=>u.v===a).f;
  const resultado=valor===""?null:(Number(valor)*fDe/fA);
  return <div style={{background:"#fff",border:"1.5px solid #DDE4EE",borderRadius:16,padding:"18px",marginBottom:14}}>
    <div style={{fontSize:16,fontWeight:700,color:"#0a1c35",marginBottom:14,display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:20}}>{icono}</span>{titulo}</div>
    <Campo etiqueta="Cantidad" type="number" value={valor} onChange={e=>setValor(e.target.value)} placeholder="0"/>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      <Selector etiqueta="De" value={de} onChange={e=>setDe(e.target.value)} opciones={unidades.map(u=>({v:u.v,l:u.l}))}/>
      <Selector etiqueta="A" value={a} onChange={e=>setA(e.target.value)} opciones={unidades.map(u=>({v:u.v,l:u.l}))}/>
    </div>
    <div style={{background:colorAcento+"12",borderRadius:10,padding:"14px",textAlign:"center",marginTop:4}}>
      <div style={{fontSize:24,fontWeight:800,color:colorAcento}}>{resultado===null?"—":resultado.toLocaleString("es-MX",{maximumFractionDigits:4})}</div>
      <div style={{fontSize:13,color:"#8FA0B4",marginTop:3}}>{unidades.find(u=>u.v===a).l}</div>
    </div>
  </div>;
}

function ConversorTemperatura(){
  const[valor,setValor]=useState("0");

// Cálculo de pago mensual de hipoteca (amortización francesa)
function pagoMensualHipoteca(monto,tasaAnual,anios){
  const r=tasaAnual/100/12, n=anios*12;
  if(r===0)return monto/n;
  return monto*r/(1-Math.pow(1+r,-n));
}

// Simulador hipotecario rápido — vive en Herramientas, sin captura de lead
function SimuladorHipotecarioRapido(){

  const[enganchePct,setEnganchePct]=useState("20");
  const[tasa,setTasa]=useState("11.5");
  const[anios,setAnios]=useState("20");

  const vi=Number(valorInmueble)||0;
  const engPct=Number(enganchePct)||0;
  const enganche=vi*engPct/100;
  const monto=vi-enganche;
  const a=Number(anios)||1;
  const pagoMensual=monto>0?pagoMensualHipoteca(monto,Number(tasa)||0,a):0;
  const totalPagado=pagoMensual*a*12;

        </div>
        <div style={{background:"rgba(255,255,255,.15)",borderRadius:10,padding:"10px",textAlign:"center"}}>
          <div style={{fontSize:14,fontWeight:700}}>{pesos(monto)}</div>
          <div style={{fontSize:11,color:"rgba(255,255,255,.7)",marginTop:3}}>Monto a financiar</div>
        </div>
      </div>
      <div style={{fontSize:13,color:"rgba(255,255,255,.75)",marginTop:12,lineHeight:1.5}}>
        En {a} años pagarías {pesos(totalPagado)} en total — de eso, {pesos(totalIntereses>0?totalIntereses:0)} serían solo intereses.
