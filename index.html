function CalculadoraCETES(){
  const[monto,setMonto]=useState("50000");
  const[tasa,setTasa]=useState("11");
  const[dias,setDias]=useState("182");
  const m=Number(monto)||0,t=Number(tasa)||0,d=Number(dias)||1;
  const rendimiento=m*(t/100)*(d/360);
  const total=m+rendimiento;
  return <div>
    <div style={{fontSize:16,fontWeight:700,color:"#0a1c35",marginBottom:14}}>📈 Calculadora CETES</div>
    <div style={{fontSize:13,color:"#8FA0B4",marginBottom:14,lineHeight:1.4}}>Los CETES son instrumentos de inversión del gobierno mexicano. Esto es solo una estimación — la tasa real cambia en cada subasta.</div>
    <Campo etiqueta="¿Cuánto vas a invertir?" type="number" value={monto} onChange={e=>setMonto(e.target.value)} placeholder="50000" min="0" step="1000"/>
    <Campo etiqueta="Tasa anual estimada (%)" type="number" value={tasa} onChange={e=>setTasa(e.target.value)} placeholder="11" min="0" step="0.1"/>
    <Selector etiqueta="Plazo" value={dias} onChange={e=>setDias(e.target.value)} opciones={[{v:"28",l:"28 días"},{v:"91",l:"91 días"},{v:"182",l:"182 días"},{v:"364",l:"364 días"}]}/>
    <div style={{background:"linear-gradient(135deg,#10b981,#059669)",borderRadius:14,padding:"18px",marginTop:8,color:"#fff"}}>
      <div style={{fontSize:13,color:"rgba(255,255,255,.7)",marginBottom:4}}>LO QUE GANARÍAS</div>
      <div style={{fontSize:28,fontWeight:800}}>{pesos(rendimiento)}</div>
      <div style={{fontSize:13,color:"rgba(255,255,255,.8)",marginTop:10}}>Recibirías en total: <strong>{pesos(total)}</strong></div>
    </div>
  </div>;
}

function CalculadoraTDC(){
  const[saldo,setSaldo]=useState("15000");
  const[tasa,setTasa]=useState("45");
  const[pctMinimo,setPctMinimo]=useState("5");
  const s=Number(saldo)||0,tasaM=(Number(tasa)||0)/100/12,pm=(Number(pctMinimo)||1)/100;
  let saldoSim=s,meses=0,totalPagado=0,totalInteres=0;
  while(saldoSim>1&&meses<600){
    const interes=saldoSim*tasaM;
    let pago=Math.max(saldoSim*pm,200);
    if(pago>saldoSim+interes)pago=saldoSim+interes;
    totalInteres+=interes;
    totalPagado+=pago;
    saldoSim=saldoSim+interes-pago;
    meses++;
  }
  return <div>
    <div style={{fontSize:16,fontWeight:700,color:"#0a1c35",marginBottom:14}}>💳 ¿Cuánto te cuesta pagar solo el mínimo?</div>
    <Campo etiqueta="¿Cuánto debes en tu tarjeta?" type="number" value={saldo} onChange={e=>setSaldo(e.target.value)} placeholder="15000" min="0" step="500"/>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
      <Campo etiqueta="Tasa de interés anual (%)" ayuda="Revísala en tu estado de cuenta" type="number" value={tasa} onChange={e=>setTasa(e.target.value)} placeholder="45" min="0" step="1"/>
      <Campo etiqueta="% de pago mínimo" type="number" value={pctMinimo} onChange={e=>setPctMinimo(e.target.value)} placeholder="5" min="1" step="0.5"/>
    </div>
    <div style={{background:"linear-gradient(135deg,#dc2626,#991b1b)",borderRadius:14,padding:"18px",marginTop:8,color:"#fff"}}>
      <div style={{fontSize:13,color:"rgba(255,255,255,.75)",marginBottom:4}}>SI SOLO PAGAS EL MÍNIMO...</div>
      <div style={{fontSize:28,fontWeight:800}}>{Math.floor(meses/12)} años y {meses%12} meses</div>
      <div style={{fontSize:13,color:"rgba(255,255,255,.85)",marginTop:4}}>para terminar de pagar esta deuda</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:14}}>
        <div style={{background:"rgba(255,255,255,.15)",borderRadius:10,padding:"10px",textAlign:"center"}}>
          <div style={{fontSize:14,fontWeight:700}}>{pesos(totalInteres)}</div>
          <div style={{fontSize:11,color:"rgba(255,255,255,.8)",marginTop:3}}>Solo en intereses</div>
        </div>
        <div style={{background:"rgba(255,255,255,.15)",borderRadius:10,padding:"10px",textAlign:"center"}}>
          <div style={{fontSize:14,fontWeight:700}}>{pesos(totalPagado)}</div>
          <div style={{fontSize:11,color:"rgba(255,255,255,.8)",marginTop:3}}>Total que pagarías</div>
        </div>
      </div>
    </div>
    <div style={{background:"#fffbeb",border:"1.5px solid #fde68a",borderRadius:10,padding:"12px 14px",marginTop:14,fontSize:14,color:"#92400e",lineHeight:1.5}}>
      💡 Si pagas más que el mínimo cada mes, terminas de pagar mucho más rápido y ahorras miles de pesos en intereses.
    </div>
  </div>;
}

  const OPCIONES=[
    {id:"nuevo_pago",icono:"tarjeta",nombre:"Nuevo pago o recordatorio",desc:"Tarjeta, seguro, inversión..."},
    {id:"nuevo_servicio_hogar",icono:"hogar",nombre:"Recordatorio del hogar",desc:"Luz, agua, gas, renta / hipoteca"},
    {id:"nueva_meta",icono:"meta",nombre:"Nueva meta de ahorro",desc:"Para lo que estás juntando dinero"},
    {id:"nueva_lista",icono:"cart",nombre:"Nueva lista de compras",desc:"Para tu próxima compra"},
    {id:"nueva_categoria",icono:"grafico",nombre:"Nueva categoría de gasto",desc:"Para tu presupuesto"},
    {id:"nuevo_auto",icono:"auto",nombre:"Registrar un auto",desc:"Hasta 5 autos"},
  ];
  return <div style={{position:"fixed",inset:0,background:"rgba(15,23,42,.55)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:1000}} onClick={onClose}>
    <div style={{background:"#fff",borderRadius:"20px 20px 0 0",padding:"24px 20px 32px",width:"100%",maxWidth:540,maxHeight:"85vh",overflowY:"auto"}} onClick={e=>e.stopPropagation()}>
      <div style={{width:40,height:4,background:"#DDE4EE",borderRadius:99,margin:"0 auto 20px"}}/>
      <h3 style={{margin:"0 0 18px",fontSize:18,fontWeight:700,color:"#0a1c35"}}>¿Qué quieres agregar?</h3>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {OPCIONES.map(o=><button key={o.id} onClick={()=>onElegir(o.id)}
          style={{background:"#f8fafc",border:"1.5px solid #DDE4EE",borderRadius:14,padding:"14px",cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:14}}>
          <div style={{width:46,height:46,borderRadius:12,background:"#eef2ff",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><Ico name={o.icono} size={23} color="#10284A" stroke={2.2}/></div>
          <div style={{flex:1}}>
            <div style={{fontSize:15,fontWeight:700,color:"#0a1c35"}}>{o.nombre}</div>
            <div style={{fontSize:13,color:"#8FA0B4",marginTop:2}}>{o.desc}</div>
          </div>
        </button>)}
      </div>
      <button onClick={onClose} style={{width:"100%",background:"none",border:"none",color:"#8FA0B4",fontSize:15,padding:"16px",cursor:"pointer",marginTop:6}}>Cancelar</button>
    </div>
  </div>;
}

// ── APP PRINCIPAL ─────────────────────────────────────────────
function App(){
  const[pantalla,setPantalla]=useState("inicio");
  // Estado personal: se carga de localStorage o, si no existe, de los datos de ejemplo.
  const[recordatorios,setRecordatorios]=useState(()=>cargar("recordatorios",initRecordatorios));
  const[presupuesto,setPresupuesto]=useState(()=>cargar("presupuesto",initPresupuesto));
  const[listas,setListas]=useState(()=>cargar("listas",initListas));
  const[metas,setMetas]=useState(()=>cargar("metas",initMetas));
  const[autos,setAutos]=useState(()=>cargar("autos",initAutos));
  const[menuAgregarAbierto,setMenuAgregarAbierto]=useState(false);
  const[accion,setAccion]=useState(null);

  // Guarda automáticamente cada estado en localStorage cuando cambia.
  useEffect(()=>{try{localStorage.setItem("upco_recordatorios",JSON.stringify(recordatorios));}catch(e){}},[recordatorios]);
  useEffect(()=>{try{localStorage.setItem("upco_presupuesto",JSON.stringify(presupuesto));}catch(e){}},[presupuesto]);
  useEffect(()=>{try{localStorage.setItem("upco_listas",JSON.stringify(listas));}catch(e){}},[listas]);
  useEffect(()=>{try{localStorage.setItem("upco_metas",JSON.stringify(metas));}catch(e){}},[metas]);
  useEffect(()=>{try{localStorage.setItem("upco_autos",JSON.stringify(autos));}catch(e){}},[autos]);

  const urgentesDinero=recordatorios.filter(r=>r.area==="dinero"&&diasPara(r.fecha)<=7).length;
  const urgentesHogar=recordatorios.filter(r=>r.area==="hogar"&&diasPara(r.fecha)<=7).length;

  const autoPrincipal=autos[0];
  const diaHoyNoCircula=autoPrincipal?diaNoCircula(autoPrincipal.placas):null;
  const hoyEsDiaDeNoCircular=diaHoyNoCircula&&new Date().toLocaleDateString("es-MX",{weekday:"long"}).toLowerCase()===diaHoyNoCircula.toLowerCase();

  const NAV=[
    {id:"inicio",icono:"inicio",label:"Inicio"},
    {id:"dinero",icono:"dinero",label:"Mi dinero",badge:urgentesDinero||null},
    {id:"hogar",icono:"hogar",label:"Mi hogar",badge:urgentesHogar||null},
    {id:"mas",icono:"mas",label:"Más"},
  ];

  const irA=destino=>{setPantalla(destino==="recordatorios"?"dinero":destino);};

  const elegirAccion=id=>{
    setMenuAgregarAbierto(false);
    if(id==="nuevo_pago"||id==="nueva_meta"||id==="nueva_lista"||id==="nueva_categoria")setPantalla("dinero");
    else if(id==="nuevo_servicio_hogar")setPantalla("hogar");
    else if(id==="nuevo_auto")setPantalla("mas");
    setAccion(id);
  };
  const consumirAccion=()=>setAccion(null);

  const VISTAS={
    inicio:<Inicio recordatorios={recordatorios} presupuesto={presupuesto} metas={metas} irA={irA}/>,
    dinero:<MiDinero recordatorios={recordatorios} setRecordatorios={setRecordatorios} presupuesto={presupuesto} setPresupuesto={setPresupuesto} metas={metas} setMetas={setMetas} listas={listas} setListas={setListas} accion={accion} onConsumirAccion={consumirAccion}/>,
    hogar:<MiHogar recordatorios={recordatorios} setRecordatorios={setRecordatorios} accion={accion} onConsumirAccion={consumirAccion}/>,
    mas:<Mas autos={autos} setAutos={setAutos} irAMas={{accion,consumir:consumirAccion}}/>,
  };

  return <div style={{minHeight:"100vh",background:"#F4F7FB",fontFamily:"'Inter',-apple-system,sans-serif"}}>
    <header style={{background:"#fff",borderBottom:"1px solid #DDE4EE",padding:"0 20px",height:64,display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:200,boxShadow:"0 1px 4px rgba(0,0,0,.05)"}}>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        <div style={{boxShadow:"0 4px 12px rgba(16,40,74,.22)",borderRadius:11,lineHeight:0}}><Monograma size={38}/></div>
        <div>
          <div style={{fontSize:17,fontWeight:800,color:"#0a1c35",lineHeight:1}}>Upco <span style={{color:"#F59E0B"}}>Homey</span></div>
          <div style={{fontSize:11,color:"#8FA0B4",lineHeight:1,marginTop:1}}>Tu asistente financiero</div>
        </div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:10}}>
        {(urgentesDinero+urgentesHogar)>0&&<div style={{background:"#ef4444",color:"#fff",borderRadius:99,fontSize:12,fontWeight:700,padding:"3px 10px",boxShadow:"0 2px 8px rgba(239,68,68,.3)"}}>{urgentesDinero+urgentesHogar} urgente{(urgentesDinero+urgentesHogar)>1?"s":""}</div>}
        <div style={{width:38,height:38,borderRadius:"50%",background:"linear-gradient(135deg,#10284A,#1a3a6e)",display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",fontWeight:700,fontSize:14,boxShadow:"0 3px 10px rgba(16,40,74,.22)"}}>
          {USUARIO.name.split(" ").map(w=>w[0]).slice(0,2).join("")}
        </div>
      </div>
    </header>

    {pantalla==="inicio"&&hoyEsDiaDeNoCircular&&<div style={{maxWidth:600,margin:"16px auto 0",padding:"0 16px"}}>
      <div style={{background:"#fef2f2",border:"1.5px solid #fca5a5",borderRadius:14,padding:"14px 16px",display:"flex",alignItems:"center",gap:12}}>
        <Ico name="semaforo" size={28} color="#dc2626"/>
        <div>
          <div style={{fontSize:15,fontWeight:700,color:"#dc2626"}}>Hoy no circula tu {autoPrincipal.marca} {autoPrincipal.modelo}</div>
          <div style={{fontSize:13,color:"#8FA0B4",marginTop:2}}>Por terminación de placa {terminacion(autoPrincipal.placas)} — evita la multa</div>
        </div>
      </div>
    </div>}

    <main style={{maxWidth:600,margin:"0 auto",padding:"20px 16px 110px"}}>
      {VISTAS[pantalla]}
    </main>

    <BotonMasFlotante onAbrir={()=>setMenuAgregarAbierto(true)}/>
    <MenuAgregar open={menuAgregarAbierto} onClose={()=>setMenuAgregarAbierto(false)} onElegir={elegirAccion}/>

    <nav style={{position:"fixed",bottom:0,left:0,right:0,background:"#fff",borderTop:"1px solid #DDE4EE",display:"flex",zIndex:200,boxShadow:"0 -2px 12px rgba(0,0,0,.06)",paddingBottom:"env(safe-area-inset-bottom)"}}>
      {NAV.map(n=><button key={n.id} onClick={()=>setPantalla(n.id)}
        style={{flex:1,padding:"10px 4px 10px",border:"none",background:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4,position:"relative",minHeight:60}}>
        <Ico name={n.icono} size={24} color={pantalla===n.id?"#10284A":"#8FA0B4"} stroke={pantalla===n.id?2.4:2}/>
        <span style={{fontSize:11,fontWeight:pantalla===n.id?700:500,color:pantalla===n.id?"#10284A":"#8FA0B4",lineHeight:1}}>{n.label}</span>
        {pantalla===n.id&&<div style={{position:"absolute",bottom:0,left:"50%",transform:"translateX(-50%)",width:32,height:3,background:"#F59E0B",borderRadius:"3px 3px 0 0"}}/>}
        {n.badge&&<div style={{position:"absolute",top:6,right:"calc(50% - 20px)",background:"#ef4444",color:"#fff",borderRadius:99,fontSize:10,fontWeight:700,padding:"1px 5px",minWidth:18,textAlign:"center"}}>{n.badge}</div>}
      </button>)}
    </nav>
  </div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

// Oculta la pantalla de inicio una vez que la app está montada (mínimo 1.8s para que se vea la animación).
window.addEventListener("load",()=>{
  setTimeout(()=>{
    const s=document.getElementById("splash");
    if(s){s.classList.add("oculto");setTimeout(()=>s.remove(),700);}
  },1800);
});
</script>
</body>
</html>
